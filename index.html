<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Black Gold Blitz</title>
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxMDAgMTAwJz48dGV4dCB5PScuOWVtJyBmb250LXNpemU9JzkwJz7wn5uiPC90ZXh0Pjwvc3ZnPg==">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
canvas {
  display: block;
  width: 100%; height: 100%;
}
#game-canvas {
  position: fixed;
  inset: 0;
  width: 100% !important;
  height: 100% !important;
  z-index: 1;
  pointer-events: none;
}
#loading-screen {
  position: fixed;
  inset: 0;
  background: #000d1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  color: #ff8800;
  font-family: monospace;
  gap: 24px;
}
#loading-screen h1 {
  font-size: clamp(24px, 5vw, 48px);
  letter-spacing: 4px;
}
#loading-spinner {
  width: 48px; height: 48px;
  border: 4px solid #1a3a1a;
  border-top-color: #ff8800;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-screen p {
  font-size: 14px;
  color: #ffcc00;
  letter-spacing: 2px;
}
</style>
</head>
<body>
<div id="loading-screen">
  <h1>BLACK GOLD BLITZ</h1>
  <div id="loading-spinner"></div>
  <p>LOADING...</p>
</div>
<canvas id="game-canvas"></canvas>
<script>
  // Fallback: remove loading screen if the game module fails to load or initialize
  // This runs even if the module script below 404s or throws an error
  setTimeout(function() {
    var el = document.getElementById('loading-screen');
    if (el) el.remove();
  }, 8000);
</script>
<script type="module" src="/src/main.js"></script>
</body>
</html>
