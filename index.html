}

function drawEnemies() {
  for (const e of enemies) {
    const f = FACTIONS[e.faction] || FACTIONS.red;
    if (e.stunTimer > 0) {
      ctx.save(); ctx.translate(e.x, e.y); ctx.globalAlpha = 0.3; ctx.strokeStyle = "#44ffff"; ctx.lineWidth = 1;
      for (let s = 0; s < 3; s++) { const sa = Math.random() * Math.PI * 2; const sr = rand(8, 16); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(Math.cos(sa) * sr, Math.sin(sa) * sr); ctx.stroke(); }
      ctx.globalAlpha = 1; ctx.restore();
    }
    if (e.type === "drone") drawDrone(e, f);
    else if (e.type === "plane") drawPlaneE(e, f);
    else if (e.type === "chopper") drawChopperE(e, f);
    // HP bar
    if (e.hp < e.maxHp) {
      const bw = e.isBoss ? 40 : e.type === "chopper" ? 30 : 24;
      ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(e.x - bw / 2 - 1, e.y - (e.isBoss ? 32 : 24), bw + 2, 5);
      ctx.fillStyle = "#222"; ctx.fillRect(e.x - bw / 2, e.y - (e.isBoss ? 31 : 23), bw, 3);
      const hp = e.hp / e.maxHp;
      ctx.fillStyle = f.accent;
      ctx.fillRect(e.x - bw / 2, e.y - (e.isBoss ? 31 : 23), bw * hp, 3);
    }
    // Boss indicator
    if (e.isBoss) {
      ctx.globalAlpha = 0.4 + Math.sin(time * 4) * 0.2;
      ctx.strokeStyle = f.accent; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.radius + 8, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.font = "bold 8px monospace"; ctx.fillStyle = f.accent; ctx.textAlign = "center";
      ctx.fillText("BOSS", e.x, e.y - (e.isBoss ? 36 : 28));
    }
  }
}

function drawDrone(e, f) {
  const scale = e.isBoss ? 1.6 : (f.style === "tanky" ? 1.3 : 1);
  ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.angle); ctx.scale(scale, scale);
  ctx.strokeStyle = f.dark; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-9, -9); ctx.lineTo(9, 9); ctx.moveTo(9, -9); ctx.lineTo(-9, 9); ctx.stroke();
  ctx.fillStyle = f.body; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = f.accent; ctx.beginPath(); ctx.arc(0, -1, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "rgba(255," + (100 + Math.sin(time * 8) * 50) + ",0,0.9)";
  ctx.beginPath(); ctx.arc(3, 0, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  const offsets = [[-9, -9], [9, -9], [-9, 9], [9, 9]];
  for (const [ox, oy] of offsets) {
    const rx = e.x + (Math.cos(e.angle) * ox - Math.sin(e.angle) * oy) * scale;
    const ry = e.y + (Math.sin(e.angle) * ox + Math.cos(e.angle) * oy) * scale;
    ctx.save(); ctx.translate(rx, ry); ctx.rotate(e.rotorAngle);
    ctx.globalAlpha = 0.4; ctx.strokeStyle = f.accent; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-6, 0); ctx.lineTo(6, 0); ctx.stroke();
    ctx.globalAlpha = 0.08; ctx.fillStyle = f.accent; ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1; ctx.restore();
  }
}

function drawPlaneE(e, f) {
  ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.angle);
  ctx.fillStyle = f.body;
  ctx.beginPath(); ctx.moveTo(18, 0); ctx.bezierCurveTo(16, -3, 4, -5, -8, -4); ctx.lineTo(-14, -2); ctx.lineTo(-14, 2); ctx.lineTo(-8, 4); ctx.bezierCurveTo(4, 5, 16, 3, 18, 0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = lerp ? f.accent : f.body;
  ctx.beginPath(); ctx.moveTo(2, -4); ctx.lineTo(-6, -16); ctx.lineTo(-10, -16); ctx.lineTo(-4, -4); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(2, 4); ctx.lineTo(-6, 16); ctx.lineTo(-10, 16); ctx.lineTo(-4, 4); ctx.closePath(); ctx.fill();
  ctx.fillStyle = f.accent; ctx.fillRect(-9, -17, 3, 2); ctx.fillRect(-9, 15, 3, 2);
  ctx.fillStyle = f.dark;
  ctx.beginPath(); ctx.moveTo(-12, -2); ctx.lineTo(-16, -8); ctx.lineTo(-18, -8); ctx.lineTo(-14, -2); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-12, 2); ctx.lineTo(-16, 8); ctx.lineTo(-18, 8); ctx.lineTo(-14, 2); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-12, 0); ctx.lineTo(-17, -5); ctx.lineTo(-14, 0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#44aadd"; ctx.beginPath(); ctx.ellipse(12, 0, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = f.accent; ctx.fillRect(0, -1.5, 10, 3);
  ctx.globalAlpha = 0.5; ctx.fillStyle = "#ffaa44"; ctx.beginPath(); ctx.ellipse(-14, 0, 2, 1.5, 0, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
  ctx.save(); ctx.translate(18, 0); ctx.rotate(e.propAngle || 0);
  ctx.globalAlpha = 0.5; ctx.strokeStyle = "#aaa"; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(5, 0); ctx.stroke(); ctx.globalAlpha = 1; ctx.restore();
  ctx.restore();
}

function drawChopperE(e, f) {
  const scale = e.isBoss ? 1.5 : 1;
  ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.angle); ctx.scale(scale, scale);
  ctx.fillStyle = f.dark; ctx.beginPath(); ctx.moveTo(-6, -2); ctx.lineTo(-20, -1); ctx.lineTo(-20, 1); ctx.lineTo(-6, 2); ctx.closePath(); ctx.fill();
  ctx.fillStyle = f.body; ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(-24, -5); ctx.lineTo(-18, -1); ctx.closePath(); ctx.fill();
  ctx.fillStyle = f.body;
  ctx.beginPath(); ctx.moveTo(14, 0); ctx.bezierCurveTo(12, -6, 4, -9, -4, -7); ctx.lineTo(-8, -4); ctx.lineTo(-6, 0); ctx.lineTo(-8, 4); ctx.lineTo(-4, 7); ctx.bezierCurveTo(4, 9, 12, 6, 14, 0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "rgba(200,100,100,0.3)"; ctx.beginPath(); ctx.ellipse(4, -2, 6, 2.5, -0.1, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = f.dark; ctx.fillRect(0, -10, 6, 2.5); ctx.fillRect(0, 7.5, 6, 2.5);
  ctx.fillStyle = "#ffaa44"; ctx.beginPath(); ctx.ellipse(8, 0, 5, 3.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = f.accent; ctx.lineWidth = 0.8; ctx.beginPath(); ctx.ellipse(8, 0, 5, 3.5, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = f.accent; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(14, 0); ctx.bezierCurveTo(12, -6, 4, -9, -4, -7); ctx.lineTo(-8, -4); ctx.lineTo(-6, 0); ctx.lineTo(-8, 4); ctx.lineTo(-4, 7); ctx.bezierCurveTo(4, 9, 12, 6, 14, 0); ctx.stroke();
  ctx.restore();
  // Main rotor
  ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.rotorAngle || 0);
  const rotorR = 18 * scale;
  ctx.globalAlpha = 0.07; ctx.fillStyle = f.accent; ctx.beginPath(); ctx.arc(0, 0, rotorR, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 0.5; ctx.strokeStyle = f.accent; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-rotorR, 0); ctx.lineTo(rotorR, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -rotorR); ctx.lineTo(0, rotorR); ctx.stroke();
  ctx.globalAlpha = 1; ctx.fillStyle = "#666"; ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  // Tail rotor
  ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.angle); ctx.translate(-20 * scale, -4 * scale); ctx.rotate(e.tailRotorAngle || 0);
  ctx.globalAlpha = 0.4; ctx.strokeStyle = f.accent; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(4, 0); ctx.stroke(); ctx.globalAlpha = 1; ctx.restore();
}

function drawBullets() {
  for (const b of bullets) {
    ctx.save(); ctx.translate(b.x, b.y);
    ctx.globalAlpha = 0.3; ctx.fillStyle = b.crit ? "#ff4444" : "#ffee55"; ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1; ctx.fillStyle = b.crit ? "#ff6666" : "#ffee88"; ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(0, 0, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  for (const b of enemyBullets) {
    const c = b.color || "#ff4444";
    ctx.save(); ctx.translate(b.x, b.y);
    ctx.globalAlpha = 0.3; ctx.fillStyle = c; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1; ctx.fillStyle = c; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#ffaa88"; ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  for (const m of homingMissiles) {
    ctx.save(); ctx.translate(m.x, m.y); ctx.rotate(m.angle);
    ctx.fillStyle = "#dd6600";
    ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(-4, -3); ctx.lineTo(-6, -3); ctx.lineTo(-6, 3); ctx.lineTo(-4, 3); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#ff8800"; ctx.beginPath(); ctx.arc(6, 0, 2.5, -Math.PI / 2, Math.PI / 2); ctx.fill();
    ctx.fillStyle = "#aa4400"; ctx.fillRect(-6, -5, 3, 2); ctx.fillRect(-6, 3, 3, 2);
    ctx.fillStyle = "#ffaa00"; ctx.beginPath(); ctx.arc(-7, 0, 2 + Math.sin(time * 30) * 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = clamp(p.life / p.maxLife, 0, 1);
    if (p.type === "smoke") {
      ctx.globalAlpha = alpha * 0.5; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (2 - alpha), 0, Math.PI * 2); ctx.fill();
    } else if (p.type === "fire") {
      ctx.globalAlpha = alpha * 0.3; ctx.fillStyle = "#ff6600"; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 2, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2); ctx.fill();
    } else if (p.type === "oil") {
      ctx.globalAlpha = alpha * 0.7; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (1.5 - alpha * 0.5), 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.globalAlpha = alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    const alpha = clamp(ft.life / ft.maxLife, 0, 1);
    ctx.globalAlpha = alpha; ctx.font = "bold " + (ft.size || 13) + "px monospace"; ctx.textAlign = "center";
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillText(ft.text, ft.x + 1, ft.y + 1);
    ctx.fillStyle = ft.color; ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  const pad = 16, barW = Math.min(240, W * 0.35), barH = 20;
  // Panel background
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  const panelH = 90 + (totalUpgrades > 0 ? 18 : 0);
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(pad - 6, pad - 6, barW + 16, panelH, 8); ctx.fill(); }
  else ctx.fillRect(pad - 6, pad - 6, barW + 16, panelH);

  // Oil bar
  const oilPct = player.oil / getMaxOil();
  ctx.fillStyle = "#111";
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(pad, pad, barW, barH, 4); ctx.fill(); }
  else ctx.fillRect(pad, pad, barW, barH);
  const oilColor = oilPct > 0.5 ? "#44dd44" : oilPct > 0.25 ? "#dddd44" : "#dd4444";
  ctx.fillStyle = oilColor;
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(pad, pad, Math.max(0, barW * oilPct), barH, 4); ctx.fill(); }
  else ctx.fillRect(pad, pad, Math.max(0, barW * oilPct), barH);
  ctx.fillStyle = "#fff"; ctx.font = "bold 12px monospace"; ctx.textAlign = "left";
  ctx.fillText("OIL: " + Math.floor(player.oil) + " / " + getMaxOil(), pad + 4, pad + 15);

  // XP bar
  const xpBarY = pad + barH + 4;
  const xpPct = playerLevel >= MAX_LEVEL ? 1 : playerXP / xpForLevel(playerLevel);
  ctx.fillStyle = "#111";
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(pad, xpBarY, barW, 10, 3); ctx.fill(); }
  else ctx.fillRect(pad, xpBarY, barW, 10);
  ctx.fillStyle = "#44ccaa";
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(pad, xpBarY, Math.max(0, barW * xpPct), 10, 3); ctx.fill(); }
  else ctx.fillRect(pad, xpBarY, Math.max(0, barW * xpPct), 10);
  ctx.fillStyle = "#fff"; ctx.font = "bold 9px monospace";
  ctx.fillText("LVL " + playerLevel + (statPoints > 0 ? " [" + statPoints + " pts]" : "") + (playerLevel >= MAX_LEVEL ? " MAX" : ""), pad + 4, xpBarY + 8);

  // Score
  ctx.textAlign = "right"; ctx.font = "bold 18px monospace"; ctx.fillStyle = "#ffcc00";
  ctx.fillText("" + score, W - pad, pad + 18);
  ctx.font = "10px monospace"; ctx.fillStyle = "#aaa"; ctx.fillText("SCORE", W - pad, pad + 30);
  if (highScore > 0) {
    ctx.fillStyle = "#666"; ctx.font = "9px monospace";
    ctx.fillText("BEST: " + highScore, W - pad, pad + 42);
  }
  // Time survived
  ctx.fillStyle = "#777"; ctx.font = "9px monospace"; ctx.textAlign = "right";
  const mins = Math.floor(timeSurvived / 60);
  const secs = Math.floor(timeSurvived % 60);
  ctx.fillText("TIME: " + mins + ":" + (secs < 10 ? "0" : "") + secs, W - pad, pad + 54);

  // Combo / Streak
  if (combo > 1) {
    ctx.textAlign = "center"; ctx.font = "bold 16px monospace";
    ctx.fillStyle = "rgba(255,68,255," + Math.min(1, comboTimer / COMBO_DECAY + 0.3) + ")";
    ctx.fillText(combo + "x COMBO", W / 2, pad + 20);
  }
  if (killStreak >= 5) {
    ctx.textAlign = "center"; ctx.font = "bold 12px monospace";
    ctx.fillStyle = "rgba(255,204,0," + Math.min(1, streakTimer / STREAK_DECAY + 0.3) + ")";
    ctx.fillText(killStreak + " STREAK", W / 2, pad + 38);
  }

  // Wanted
  let wy = pad + barH + 18;
  if (wantedLevel > 0) {
    ctx.font = "bold 14px monospace"; ctx.fillStyle = "#ff4444"; ctx.textAlign = "right";
    let s = "WANTED "; for (let i = 0; i < wantedLevel; i++) s += "★"; for (let i = wantedLevel; i < WANTED_THRESHOLDS.length - 1; i++) s += "☆";
    ctx.fillText(s, W - pad, pad + 56);
  }

  // Weapons
  ctx.textAlign = "left"; ctx.font = "11px monospace";
  wy = pad + barH + 22;
  ctx.fillStyle = player.oil >= DUAL_CANNON_THRESHOLD ? "#44ff88" : "#555";
  ctx.fillText("DUAL CANNONS" + (player.oil >= DUAL_CANNON_THRESHOLD ? " ✓" : ""), pad, wy);
  wy += 14;
  ctx.fillStyle = player.oil >= HOMING_THRESHOLD ? "#ff8844" : "#555";
  ctx.fillText("MISSILES" + (player.oil >= HOMING_THRESHOLD ? " [E/RMB] ✓" : " (" + HOMING_THRESHOLD + ")"), pad, wy);
  wy += 14;
  ctx.fillStyle = settings.autoFire ? "#44ff88" : "#555";
  ctx.fillText("AUTO-FIRE [F]" + (settings.autoFire ? " ON" : " OFF"), pad, wy);

  // Upgrades
  if (totalUpgrades > 0) {
    wy += 16; ctx.font = "10px monospace"; ctx.fillStyle = "#888";
    let ut = "UPGRADES: ";
    for (const [k, l] of Object.entries(upgradeLevels)) { if (l > 0) ut += UPGRADES[k].icon + "x" + l + " "; }
    ctx.fillText(ut, pad, wy);
  }

  // Active powerups
  const activePows = Object.entries(activePowerups).filter(([, t]) => t > 0);
  if (activePows.length > 0) {
    ctx.textAlign = "center"; ctx.font = "bold 11px monospace";
    activePows.forEach(([effect, timer], idx) => {
      const lt = LOOT_TYPES["pow_" + effect];
      if (!lt) return;
      ctx.fillStyle = lt.color;
      ctx.fillText(effect.toUpperCase() + " " + Math.ceil(timer) + "s", W / 2, H - 30 - idx * 16);
    });
  }

  // Shield
  if (upgradeStats.hasShield) {
    ctx.textAlign = "right"; ctx.font = "12px monospace";
    if (player.shieldActive) { ctx.fillStyle = "#aa44ff"; ctx.fillText("SHIELD READY", W - pad, H - 60); }
    else { ctx.fillStyle = "#555"; ctx.fillText("SHIELD " + Math.ceil(player.shieldTimer) + "s", W - pad, H - 60); }
  }

  // Minimap
  const mmSize = Math.min(130, W * 0.2), mmX = W - mmSize - pad, mmY = H - mmSize - pad;
  ctx.fillStyle = "rgba(0,15,30,0.75)";
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(mmX - 3, mmY - 3, mmSize + 6, mmSize + 6, 6); ctx.fill(); }
  else ctx.fillRect(mmX - 3, mmY - 3, mmSize + 6, mmSize + 6);
  ctx.strokeStyle = "rgba(68,102,136,0.5)"; ctx.lineWidth = 1;
  ctx.strokeRect(mmX - 3, mmY - 3, mmSize + 6, mmSize + 6);
  const mmScale = mmSize / WORLD_W;
  for (const rig of rigs) {
    ctx.fillStyle = rig.hp <= 0 ? "#333" : rig.owner === "player" ? "#44ff88" : rig.owner === "enemy" ? "#ff4444" : "#888";
    ctx.fillRect(mmX + rig.x * mmScale - 2, mmY + rig.y * mmScale - 2, rig.hp <= 0 ? 3 : 5, rig.hp <= 0 ? 3 : 5);
    if (rig.underAttack && Math.sin(time * 6) > 0) {
      ctx.strokeStyle = "#ff0000"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(mmX + rig.x * mmScale, mmY + rig.y * mmScale, 6, 0, Math.PI * 2); ctx.stroke();
    }
  }
  for (const e of enemies) {
    ctx.fillStyle = (FACTIONS[e.faction] || FACTIONS.red).accent;
    const sz = e.isBoss ? 4 : 2;
    ctx.fillRect(mmX + e.x * mmScale - sz / 2, mmY + e.y * mmScale - sz / 2, sz, sz);
  }
  ctx.fillStyle = "#44ff44"; ctx.beginPath(); ctx.arc(mmX + player.x * mmScale, mmY + player.y * mmScale, 3, 0, Math.PI * 2); ctx.fill();
  // Upgrade progress
  ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(mmX, mmY - 14, mmSize, 8);
  const prevThresh = nextUpgradeScore - UPGRADE_INTERVAL - (totalUpgrades > 0 ? (totalUpgrades - 1) * 100 : 0);
  const upPct = clamp((score - Math.max(0, prevThresh)) / Math.max(1, nextUpgradeScore - Math.max(0, prevThresh)), 0, 1);
  ctx.fillStyle = "#aa44ff"; ctx.fillRect(mmX, mmY - 14, mmSize * upPct, 8);
  ctx.font = "7px monospace"; ctx.fillStyle = "#ddd"; ctx.textAlign = "center";
  ctx.fillText("NEXT UPGRADE", mmX + mmSize / 2, mmY - 7);
}

function drawStatPanel() {
  if (!showStatPanel || statPoints <= 0) return;
  const panelX = 10, panelY = pad + 100;
  const panelW = 180, rowH = 26;
  const panelH = 8 * rowH + 30;

  ctx.fillStyle = "rgba(0,0,0,0.7)";
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(panelX, panelY, panelW, panelH, 8); ctx.fill(); }
  else ctx.fillRect(panelX, panelY, panelW, panelH);
  ctx.strokeStyle = "rgba(255,204,0,0.4)"; ctx.lineWidth = 1;
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(panelX, panelY, panelW, panelH, 8); ctx.stroke(); }
  else ctx.strokeRect(panelX, panelY, panelW, panelH);

  ctx.font = "bold 10px monospace"; ctx.fillStyle = "#ffcc00"; ctx.textAlign = "left";
  ctx.fillText("STAT POINTS: " + statPoints + " (keys 1-8)", panelX + 8, panelY + 16);

  for (let i = 0; i < 8; i++) {
    const y = panelY + 24 + i * rowH;
    ctx.fillStyle = STAT_COLORS[i]; ctx.font = "9px monospace"; ctx.textAlign = "left";
    ctx.fillText("[" + (i + 1) + "] " + STAT_NAMES[i], panelX + 6, y + 10);
    // Stat bar
    const barX = panelX + 6, barY = y + 14, barW2 = panelW - 16, barH2 = 6;
    ctx.fillStyle = "#222"; ctx.fillRect(barX, barY, barW2, barH2);
    for (let s = 0; s < STAT_MAX; s++) {
      const sx2 = barX + (s / STAT_MAX) * barW2;
      const sw = barW2 / STAT_MAX - 1;
      ctx.fillStyle = s < stats[i] ? STAT_COLORS[i] : "#333";
      ctx.fillRect(sx2, barY, sw, barH2);
    }
  }
}

function drawTouchControls() {
  if (!("ontouchstart" in window)) return;
  // Left side hint
  ctx.fillStyle = "rgba(255,255,255,0.02)"; ctx.fillRect(0, 0, W * 0.4, H);
  // Right side hint
  ctx.fillStyle = "rgba(255,255,255,0.01)"; ctx.fillRect(W * 0.4, 0, W * 0.6, H);

  // Left joystick (movement)
  if (joystickCenter) {
    ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(joystickCenter.x, joystickCenter.y, JOYSTICK_RADIUS, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.beginPath(); ctx.arc(joystickCenter.x, joystickCenter.y, JOYSTICK_RADIUS * 0.5, 0, Math.PI * 2); ctx.stroke();
    const kx = joystickCenter.x + touchMove.x * JOYSTICK_RADIUS;
    const ky = joystickCenter.y + touchMove.y * JOYSTICK_RADIUS;
    ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.beginPath(); ctx.arc(kx, ky, 22, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.15)"; ctx.font = "9px monospace"; ctx.textAlign = "center";
    ctx.fillText("MOVE", joystickCenter.x, joystickCenter.y + JOYSTICK_RADIUS + 16);
  }

  // Right joystick (aim + fire)
  if (aimJoystickCenter) {
    ctx.strokeStyle = touchFire ? "rgba(255,200,0,0.4)" : "rgba(255,100,0,0.15)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(aimJoystickCenter.x, aimJoystickCenter.y, JOYSTICK_RADIUS, 0, Math.PI * 2); ctx.stroke();
    // Missile ring
    if (player.oil >= HOMING_THRESHOLD) {
      ctx.strokeStyle = "rgba(255,130,0,0.15)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(aimJoystickCenter.x, aimJoystickCenter.y, JOYSTICK_RADIUS * 1.3, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = "rgba(255,130,0,0.1)"; ctx.font = "7px monospace"; ctx.textAlign = "center";
      ctx.fillText("MSL", aimJoystickCenter.x, aimJoystickCenter.y - JOYSTICK_RADIUS * 1.3 - 4);
    }
    if (touchAim.active) {
      const ax = aimJoystickCenter.x + touchAim.x * JOYSTICK_RADIUS;
      const ay = aimJoystickCenter.y + touchAim.y * JOYSTICK_RADIUS;
      ctx.fillStyle = touchFire ? "rgba(255,200,0,0.4)" : "rgba(255,100,0,0.25)";
      ctx.beginPath(); ctx.arc(ax, ay, 18, 0, Math.PI * 2); ctx.fill();
      // Crosshair
      ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(ax - 8, ay); ctx.lineTo(ax + 8, ay); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ax, ay - 8); ctx.lineTo(ax, ay + 8); ctx.stroke();
    }
    ctx.fillStyle = "rgba(255,255,255,0.12)"; ctx.font = "9px monospace"; ctx.textAlign = "center";
    ctx.fillText("AIM + FIRE", aimJoystickCenter.x, aimJoystickCenter.y + JOYSTICK_RADIUS + 16);
  } else {
    // Hint text when no aim joystick
    ctx.fillStyle = "rgba(255,255,255,0.08)"; ctx.font = "12px monospace"; ctx.textAlign = "center";
    ctx.fillText("Touch right side to aim & fire", W * 0.7, H * 0.9);
  }

  // Mobile buttons: Dash + Auto-fire + Pause
  const btnSize = 36;
  const btnY = H - btnSize - 50;

  // Dash button (bottom-left area)
  const dashBtnX = 20;
  const dashReady = player.dashCooldown <= 0;
  ctx.fillStyle = dashReady ? "rgba(68,204,255,0.3)" : "rgba(68,204,255,0.1)";
  ctx.beginPath(); ctx.arc(dashBtnX + btnSize / 2, btnY + btnSize / 2, btnSize / 2, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = dashReady ? "rgba(68,204,255,0.6)" : "rgba(68,204,255,0.2)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(dashBtnX + btnSize / 2, btnY + btnSize / 2, btnSize / 2, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = dashReady ? "#44ccff" : "#335566"; ctx.font = "bold 10px monospace"; ctx.textAlign = "center";
  ctx.fillText("DASH", dashBtnX + btnSize / 2, btnY + btnSize / 2 + 4);

  // Auto-fire toggle (bottom-center-left)
  const afBtnX = 70;
  ctx.fillStyle = settings.autoFire ? "rgba(68,255,136,0.3)" : "rgba(100,100,100,0.2)";
  ctx.beginPath(); ctx.arc(afBtnX + btnSize / 2, btnY + btnSize / 2, btnSize / 2, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = settings.autoFire ? "rgba(68,255,136,0.6)" : "rgba(100,100,100,0.3)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(afBtnX + btnSize / 2, btnY + btnSize / 2, btnSize / 2, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = settings.autoFire ? "#44ff88" : "#666"; ctx.font = "bold 8px monospace"; ctx.textAlign = "center";
  ctx.fillText("AUTO", afBtnX + btnSize / 2, btnY + btnSize / 2 + 4);

  // Pause button (top-right)
  const pauseBtnX = W - 50, pauseBtnY = 10, pauseBtnSize = 30;
  ctx.fillStyle = "rgba(255,255,255,0.1)";
  ctx.fillRect(pauseBtnX, pauseBtnY, pauseBtnSize, pauseBtnSize);
  ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 1;
  ctx.strokeRect(pauseBtnX, pauseBtnY, pauseBtnSize, pauseBtnSize);
  ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.font = "bold 14px monospace"; ctx.textAlign = "center";
  ctx.fillText("⏸", pauseBtnX + pauseBtnSize / 2, pauseBtnY + pauseBtnSize / 2 + 5);

  // Stat point button for mobile
  if (statPoints > 0) {
    ctx.fillStyle = "rgba(255,204,0,0.3)"; ctx.font = "bold 11px monospace"; ctx.textAlign = "left";
    ctx.fillText("↑ " + statPoints + " STAT PTS (tap panel)", 14, H - 20);
  }
}

function drawUpgradeScreen() {
  ctx.fillStyle = "rgba(0,0,10,0.85)"; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = "center"; ctx.fillStyle = "#ffcc00";
  ctx.font = "bold " + Math.min(36, W * 0.06) + "px monospace";
  ctx.fillText("CHOOSE AN UPGRADE", W / 2, H * 0.15);
  ctx.fillStyle = "#aaa"; ctx.font = Math.min(14, W * 0.025) + "px monospace";
  ctx.fillText("Score: " + score + " | Level: " + playerLevel + " | Upgrades: " + totalUpgrades, W / 2, H * 0.22);
  const cardW = Math.min(200, W * 0.28), cardH = Math.min(260, H * 0.45), gap = Math.min(30, W * 0.03);
  const totalW2 = upgradeChoices.length * cardW + (upgradeChoices.length - 1) * gap;
  const startX = (W - totalW2) / 2, startY = (H - cardH) / 2;
  for (let i = 0; i < upgradeChoices.length; i++) {
    const key = upgradeChoices[i], up = UPGRADES[key], lvl = upgradeLevels[key] || 0;
    const cx = startX + i * (cardW + gap), cy = startY;
    ctx.fillStyle = "rgba(20,20,40,0.9)";
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(cx, cy, cardW, cardH, 12); ctx.fill(); }
    else ctx.fillRect(cx, cy, cardW, cardH);
    ctx.strokeStyle = up.color + "88"; ctx.lineWidth = 2;
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(cx, cy, cardW, cardH, 12); ctx.stroke(); }
    else ctx.strokeRect(cx, cy, cardW, cardH);
    if (mouseX >= cx && mouseX <= cx + cardW && mouseY >= cy && mouseY <= cy + cardH) {
      ctx.fillStyle = up.color + "15";
      if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(cx, cy, cardW, cardH, 12); ctx.fill(); }
      else ctx.fillRect(cx, cy, cardW, cardH);
      ctx.strokeStyle = up.color; ctx.lineWidth = 2;
      if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(cx, cy, cardW, cardH, 12); ctx.stroke(); }
      else ctx.strokeRect(cx, cy, cardW, cardH);
    }
    ctx.font = Math.min(40, cardW * 0.25) + "px serif"; ctx.textAlign = "center"; ctx.fillStyle = "#fff";
    ctx.fillText(up.icon, cx + cardW / 2, cy + cardH * 0.25);
    ctx.font = "bold " + Math.min(16, cardW * 0.09) + "px monospace"; ctx.fillStyle = up.color;
    ctx.fillText(up.name, cx + cardW / 2, cy + cardH * 0.42);
    ctx.font = Math.min(12, cardW * 0.07) + "px monospace"; ctx.fillStyle = "#888";
    let dots = ""; for (let d = 0; d < up.maxLevel; d++) dots += d < lvl ? "●" : d === lvl ? "◉" : "○";
    ctx.fillText(dots, cx + cardW / 2, cy + cardH * 0.52);
    ctx.font = Math.min(12, cardW * 0.065) + "px monospace"; ctx.fillStyle = "#bbb";
    ctx.fillText(up.desc, cx + cardW / 2, cy + cardH * 0.65);
    ctx.font = Math.min(11, cardW * 0.06) + "px monospace"; ctx.fillStyle = "#666";
    ctx.fillText("Level " + lvl + " → " + (lvl + 1), cx + cardW / 2, cy + cardH * 0.78);
    ctx.font = "bold " + Math.min(12, cardW * 0.065) + "px monospace"; ctx.fillStyle = up.color + "88";
    ctx.fillText("[ CLICK ]", cx + cardW / 2, cy + cardH * 0.9);
  }
}

function drawTitle() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, "#060d1a"); grad.addColorStop(0.5, "#0a1a2a"); grad.addColorStop(1, "#0d2240");
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  const t = performance.now() / 1000;
  for (let i = 0; i < 30; i++) {
    ctx.globalAlpha = 0.015 + Math.sin(t + i) * 0.008;
    ctx.fillStyle = i % 3 === 0 ? "#ff8800" : i % 3 === 1 ? "#ff4400" : "#ffcc00";
    ctx.beginPath(); ctx.arc((Math.sin(t * 0.3 + i * 2.1) * 0.5 + 0.5) * W, (Math.cos(t * 0.15 + i * 0.9) * 0.5 + 0.5) * H, 20 + Math.sin(t + i * 0.7) * 15, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 0.04; ctx.strokeStyle = "#4488cc"; ctx.lineWidth = 1;
  for (let i = 0; i < 10; i++) {
    ctx.beginPath();
    for (let x = 0; x <= W; x += 20) { const y = H * 0.5 + i * 30 + Math.sin(t * 1.5 + x * 0.01 + i) * 15; if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); }
    ctx.stroke();
  }
  ctx.globalAlpha = 1; ctx.textAlign = "center";
  ctx.fillStyle = "#ff8800"; ctx.font = "bold " + Math.min(52, W * 0.085) + "px monospace";
  ctx.fillText("BLACK GOLD BLITZ", W / 2, H * 0.18);
  ctx.fillStyle = "#ffcc44"; ctx.font = Math.min(16, W * 0.03) + "px monospace";
  ctx.fillText("TOP-DOWN ARCADE SHOOTER", W / 2, H * 0.24);

  // Faction colors preview
  ctx.font = "bold " + Math.min(12, W * 0.022) + "px monospace";
  const factionPreviewY = H * 0.28;
  FACTION_KEYS.forEach((fk, fi) => {
    const f = FACTIONS[fk];
    const fx = W / 2 + (fi - 1.5) * 80;
    ctx.fillStyle = f.accent;
    ctx.beginPath(); ctx.arc(fx, factionPreviewY, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = f.accent; ctx.fillText(f.name, fx, factionPreviewY + 16);
  });

  ctx.fillStyle = "#aaa"; ctx.font = Math.min(13, W * 0.025) + "px monospace";
  const features = [
    "WASD/Arrows - Move  |  Mouse - Aim  |  Space/LMB - Fire",
    "E/RMB - Homing Missiles  |  1-8 - Allocate Stat Points",
    "Shift - Dash Dodge  |  F - Auto-Fire  |  P - Pause",
    "",
    "⚡ 33 STAT POINTS across 8 categories (diep.io style)",
    "🎯 4 Enemy factions with unique AI behaviors",
    "💎 Loot drops: XP gems, oil, power-ups",
    "🏭 Capture & defend oil rigs from enemy raids",
    "🌅 Dynamic day/night cycle  |  🔊 Procedural sound",
    "",
    "Touch: Left stick = Move | Right stick = Aim + Fire",
  ];
  features.forEach((l, i) => ctx.fillText(l, W / 2, H * 0.36 + i * Math.min(22, W * 0.032)));

  ctx.fillStyle = "#aa44ff"; ctx.font = "bold " + Math.min(14, W * 0.025) + "px monospace";
  ctx.fillText("10 UNIQUE UPGRADES + STAT BUILDS + LOOT", W / 2, H * 0.72);
  const icons = Object.values(UPGRADES).map(u => u.icon).join("  ");
  ctx.font = Math.min(18, W * 0.03) + "px serif"; ctx.fillText(icons, W / 2, H * 0.77);

  if (highScore > 0) {
    ctx.fillStyle = "#ffcc00"; ctx.font = "bold " + Math.min(14, W * 0.025) + "px monospace";
    ctx.fillText("HIGH SCORE: " + highScore, W / 2, H * 0.83);
  }

  ctx.fillStyle = Math.sin(t * 3) > 0 ? "#ffcc00" : "#ff8800";
  ctx.font = "bold " + Math.min(24, W * 0.04) + "px monospace";
  ctx.fillText("[ CLICK or TAP to START ]", W / 2, H * 0.92);
}

function drawGameOver() {
  ctx.fillStyle = "rgba(0,0,0,0.75)"; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = "center";
  ctx.fillStyle = "#ff3333"; ctx.font = "bold " + Math.min(52, W * 0.085) + "px monospace";
  ctx.fillText("GAME OVER", W / 2, H * 0.15);
  ctx.fillStyle = "#ffcc00"; ctx.font = "bold " + Math.min(32, W * 0.055) + "px monospace";
  ctx.fillText("FINAL SCORE: " + score, W / 2, H * 0.24);
  if (score >= highScore && score > 0) {
    ctx.fillStyle = "#ff8844"; ctx.font = "bold " + Math.min(18, W * 0.03) + "px monospace";
    ctx.fillText("★ NEW HIGH SCORE! ★", W / 2, H * 0.29);
  }

  // Time survived
  const mins = Math.floor(timeSurvived / 60);
  const secs = Math.floor(timeSurvived % 60);
  ctx.fillStyle = "#88ccff"; ctx.font = "bold " + Math.min(16, W * 0.028) + "px monospace";
  ctx.fillText("TIME SURVIVED: " + mins + ":" + (secs < 10 ? "0" : "") + secs, W / 2, H * 0.34);

  ctx.fillStyle = "#aaa"; ctx.font = Math.min(14, W * 0.025) + "px monospace";
  let ly = H * 0.40;
  ctx.fillText("Level: " + playerLevel + " / " + MAX_LEVEL, W / 2, ly); ly += 20;
  ctx.fillText("Oil Rigs: " + rigs.filter(r => r.owner === "player").length + "/" + RIG_COUNT, W / 2, ly); ly += 20;
  ctx.fillText("Upgrades: " + totalUpgrades, W / 2, ly); ly += 20;
  ctx.fillText("Max Combo: " + maxCombo + "x | Max Streak: " + maxStreak, W / 2, ly); ly += 20;

  // Kill breakdown
  const totalKillCount = totalKills.drone + totalKills.plane + totalKills.chopper + totalKills.boss;
  ctx.fillStyle = "#ff8844"; ctx.font = "bold " + Math.min(13, W * 0.023) + "px monospace";
  ctx.fillText("KILLS: " + totalKillCount, W / 2, ly); ly += 18;
  ctx.fillStyle = "#888"; ctx.font = Math.min(11, W * 0.02) + "px monospace";
  ctx.fillText("Drones: " + totalKills.drone + " | Planes: " + totalKills.plane + " | Choppers: " + totalKills.chopper + " | Bosses: " + totalKills.boss, W / 2, ly); ly += 18;

  // Damage stats
  ctx.fillText("Damage Dealt: " + Math.floor(totalDamageDealt) + " | Damage Taken: " + Math.floor(totalDamageTaken), W / 2, ly); ly += 20;

  let ws = "Wanted: "; for (let i = 0; i < wantedLevel; i++) ws += "★"; for (let i = wantedLevel; i < WANTED_THRESHOLDS.length - 1; i++) ws += "☆";
  ctx.fillText(ws, W / 2, ly); ly += 20;

  // Stat build summary
  ctx.fillStyle = "#888"; ctx.font = Math.min(11, W * 0.02) + "px monospace";
  let statStr = "Build: ";
  for (let i = 0; i < 8; i++) { if (stats[i] > 0) statStr += STAT_NAMES[i] + ":" + stats[i] + " "; }
  ctx.fillText(statStr || "Build: (no stats allocated)", W / 2, ly); ly += 16;

  if (totalUpgrades > 0) {
    ctx.fillStyle = "#888"; ctx.font = Math.min(12, W * 0.022) + "px monospace";
    let ut = "Abilities: "; for (const [k, l] of Object.entries(upgradeLevels)) { if (l > 0) ut += UPGRADES[k].icon + " " + UPGRADES[k].name + " Lv" + l + "  "; }
    ctx.fillText(ut, W / 2, ly);
  }

  const t2 = performance.now() / 1000;
  ctx.fillStyle = Math.sin(t2 * 3) > 0 ? "#ffcc00" : "#ff8800";
  ctx.font = "bold " + Math.min(22, W * 0.04) + "px monospace";
  ctx.fillText("[ CLICK or TAP to RESTART ]", W / 2, H * 0.92);
}

function startGame() {
  initAudio();
  score = 0; waveTimer = 2; wantedLevel = 0; time = 0;
  enemies.length = 0; bullets.length = 0; enemyBullets.length = 0;
  homingMissiles.length = 0; particles.length = 0; floatingTexts.length = 0;
  loot.length = 0;
  shakeAmount = 0;
  playerLevel = 1; playerXP = 0; statPoints = 0;
  stats = [0,0,0,0,0,0,0,0];
  showStatPanel = true;
  combo = 0; comboTimer = 0; killStreak = 0; streakTimer = 0;
  maxCombo = 0; maxStreak = 0;
  activePowerups = {};
  rigRecaptureTimer = RIG_RECAPTURE_INTERVAL;
  paused = false;
  timeSurvived = 0;
  totalKills = { drone: 0, plane: 0, chopper: 0, boss: 0 };
  totalDamageTaken = 0;
  totalDamageDealt = 0;
  screenFlash = { color: "", alpha: 0 };
  vignetteIntensity = 0;
  resetPlayer(); resetUpgrades(); initRigs();
  gameState = "playing";
}

canvas.addEventListener("click", (e) => {
  if (gameState === "title" || gameState === "gameover") { initAudio(); startGame(); }
  else if (gameState === "upgrade") handleUpgradeClick(e.clientX, e.clientY);
  else if (gameState === "paused") handlePauseClick(e.clientX, e.clientY);
});
canvas.addEventListener("touchstart", (e) => {
  if (gameState === "title" || gameState === "gameover") { initAudio(); startGame(); e.preventDefault(); }
  else if (gameState === "paused") {
    for (const t of e.changedTouches) handlePauseClick(t.clientX, t.clientY);
    e.preventDefault();
  }
}, { passive: false, once: false });

function handlePauseClick(mx, my) {
  const btnW = 160, btnH = 40;
  // Resume button
  const resumeX = (W - btnW) / 2, resumeY = H * 0.45;
  if (mx >= resumeX && mx <= resumeX + btnW && my >= resumeY && my <= resumeY + btnH) {
    paused = false; gameState = "playing"; return;
  }
  // Sound toggle
  const soundY = H * 0.55;
  if (mx >= resumeX && mx <= resumeX + btnW && my >= soundY && my <= soundY + btnH) {
    settings.soundOn = !settings.soundOn; saveSettings(); return;
  }
  // Shake toggle
  const shakeY = H * 0.63;
  if (mx >= resumeX && mx <= resumeX + btnW && my >= shakeY && my <= shakeY + btnH) {
    settings.shakeOn = !settings.shakeOn; saveSettings(); return;
  }
  // Restart button
  const restartY = H * 0.73;
  if (mx >= resumeX && mx <= resumeX + btnW && my >= restartY && my <= restartY + btnH) {
    startGame(); return;
  }
}

function drawPauseScreen() {
  ctx.fillStyle = "rgba(0,0,10,0.8)"; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = "center";
  ctx.fillStyle = "#ffcc00"; ctx.font = "bold " + Math.min(40, W * 0.07) + "px monospace";
  ctx.fillText("PAUSED", W / 2, H * 0.25);

  // Time + Score
  const mins = Math.floor(timeSurvived / 60);
  const secs = Math.floor(timeSurvived % 60);
  ctx.fillStyle = "#aaa"; ctx.font = Math.min(14, W * 0.025) + "px monospace";
  ctx.fillText("Score: " + score + " | Time: " + mins + ":" + (secs < 10 ? "0" : "") + secs + " | Level: " + playerLevel, W / 2, H * 0.33);

  const btnW = 160, btnH = 40;
  const btnX = (W - btnW) / 2;

  // Resume button
  drawPauseButton(btnX, H * 0.45, btnW, btnH, "▶ RESUME", "#44ff88");
  // Sound toggle
  drawPauseButton(btnX, H * 0.55, btnW, btnH, "🔊 SOUND: " + (settings.soundOn ? "ON" : "OFF"), settings.soundOn ? "#44ccff" : "#666");
  // Shake toggle
  drawPauseButton(btnX, H * 0.63, btnW, btnH, "📳 SHAKE: " + (settings.shakeOn ? "ON" : "OFF"), settings.shakeOn ? "#44ccff" : "#666");
  // Restart
  drawPauseButton(btnX, H * 0.73, btnW, btnH, "↻ RESTART", "#ff6644");

  ctx.fillStyle = "#555"; ctx.font = Math.min(12, W * 0.022) + "px monospace";
  ctx.fillText("Press P or ESC to resume", W / 2, H * 0.88);
}

function drawPauseButton(x, y, w, h, text, color) {
  ctx.fillStyle = "rgba(20,20,40,0.8)";
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x, y, w, h, 8); ctx.fill(); }
  else ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = color + "88"; ctx.lineWidth = 2;
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x, y, w, h, 8); ctx.stroke(); }
  else ctx.strokeRect(x, y, w, h);
  // Hover effect
  if (mouseX >= x && mouseX <= x + w && mouseY >= y && mouseY <= y + h) {
    ctx.fillStyle = color + "15";
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x, y, w, h, 8); ctx.fill(); }
    else ctx.fillRect(x, y, w, h);
  }
  ctx.fillStyle = color; ctx.font = "bold " + Math.min(14, w * 0.08) + "px monospace";
  ctx.textAlign = "center"; ctx.fillText(text, x + w / 2, y + h / 2 + 5);
}

let lastTime = performance.now();
function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, MAX_DELTA_TIME);
  lastTime = now;
  if (gameState === "playing") { update(dt); draw(); }
  else if (gameState === "title") drawTitle();
  else if (gameState === "gameover") { draw(); drawGameOver(); }
  else if (gameState === "upgrade") { draw(); drawUpgradeScreen(); }
  else if (gameState === "paused") { draw(); drawPauseScreen(); }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
