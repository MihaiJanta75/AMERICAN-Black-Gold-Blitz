/* ===== PROCEDURAL SOUND (Web Audio API) ===== */
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}

function playSound(type, vol) {
  if (!audioCtx || !settings.soundOn) return;
  vol = vol || 0.3;
  const now = audioCtx.currentTime;
  try {
    if (type === "shoot") {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "square"; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.08);
      gain.gain.setValueAtTime(vol * 0.15, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.08);
    } else if (type === "explosion") {
      const bufferSize = audioCtx.sampleRate * 0.3;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
      const source = audioCtx.createBufferSource();
      const gain = audioCtx.createGain();
      source.buffer = buffer;
      gain.gain.setValueAtTime(vol * 0.4, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      const filter = audioCtx.createBiquadFilter();
      filter.type = "lowpass"; filter.frequency.setValueAtTime(600, now); filter.frequency.exponentialRampToValueAtTime(100, now + 0.3);
      source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
      source.start(now);
    } else if (type === "pickup") {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine"; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
      gain.gain.setValueAtTime(vol * 0.12, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.12);
    } else if (type === "levelup") {
      [0, 0.08, 0.16].forEach((delay, idx) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine"; osc.frequency.setValueAtTime(500 + idx * 200, now + delay);
        gain.gain.setValueAtTime(vol * 0.15, now + delay); gain.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.15);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(now + delay); osc.stop(now + delay + 0.15);
      });
    } else if (type === "hit") {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sawtooth"; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(60, now + 0.12);
      gain.gain.setValueAtTime(vol * 0.2, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.12);
    } else if (type === "missile") {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sawtooth"; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.4);
      gain.gain.setValueAtTime(vol * 0.12, now); gain.gain.linearRampToValueAtTime(0, now + 0.4);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.4);
    } else if (type === "dash") {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine"; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
      gain.gain.setValueAtTime(vol * 0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.1);
    } else if (type === "powerup") {
      [0, 0.05, 0.1, 0.15].forEach((delay, idx) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine"; osc.frequency.setValueAtTime(400 + idx * 150, now + delay);
        gain.gain.setValueAtTime(vol * 0.1, now + delay); gain.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.12);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(now + delay); osc.stop(now + delay + 0.12);
      });
    }
  } catch(e) {}
}

/* ===== CANVAS SETUP ===== */
const canvas = document.getElementById("game");

function resize() {

/* ===== UTILS ===== */
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function angle(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
function randInt(lo, hi) { return Math.floor(rand(lo, hi + 1)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

/* ===== SCREEN SHAKE ===== */
let shakeAmount = 0;
function addShake(amount) { if (settings.shakeOn) shakeAmount = Math.min(shakeAmount + amount, 15); }

/* ===== HIGH SCORES ===== */
let highScore = 0;
try { highScore = parseInt(localStorage.getItem("bgb_highscore")) || 0; } catch(e) {}
function saveHighScore(s) { if (s > highScore) { highScore = s; try { localStorage.setItem("bgb_highscore", s); } catch(e) {} } }

/* ===== INPUT ===== */
const keys = {};
window.addEventListener("keydown", e => {
  keys[e.code] = true;
  if (gameState === "playing" && e.key >= "1" && e.key <= "8") { allocateStat(parseInt(e.key) - 1); }
  if (e.code === "KeyP" || e.code === "Escape") { togglePause(); }
  if (e.code === "KeyF") { settings.autoFire = !settings.autoFire; saveSettings(); }
});
window.addEventListener("keyup", e => { keys[e.code] = false; });

let touchMove = { x: 0, y: 0, active: false };
let touchAim = { x: 0, y: 0, active: false };
let touchFire = false;
let touchMissile = false;
let joystickCenter = null;
let aimJoystickCenter = null;
const JOYSTICK_RADIUS = 60;

canvas.addEventListener("touchstart", handleTouch, { passive: false });
canvas.addEventListener("touchmove", handleTouch, { passive: false });
canvas.addEventListener("touchend", handleTouchEnd, { passive: false });
canvas.addEventListener("touchcancel", handleTouchEnd, { passive: false });

function handleTouch(e) {
  e.preventDefault();
  if (gameState === "upgrade") { handleUpgradeTouch(e); return; }
  if (gameState === "playing" && showStatPanel) { handleStatTouch(e); return; }
  if (gameState === "paused") { return; }
  if (gameState !== "playing") return;

  // Check mobile buttons first
  for (const t of e.changedTouches) {
    // Pause button (top-right)
    if (t.clientX > W - 50 && t.clientY < 40 && e.type === "touchstart") {
      togglePause(); return;
    }
    // Dash button
    const btnSize = 36;
    const btnY = H - btnSize - 50;
    if (t.clientX < 20 + btnSize && t.clientY > btnY && t.clientY < btnY + btnSize && e.type === "touchstart") {
      if (player.dashCooldown <= 0 && touchMove.active) {
        const dashA = Math.atan2(touchMove.y, touchMove.x);
        player.dashing = DASH_DURATION;
        player.dashAngle = dashA;
        player.dashCooldown = DASH_COOLDOWN;
        playSound("dash");
        addScreenFlash("#44ccff", 0.1);
      }
      return;
    }
    // Auto-fire toggle
    if (t.clientX > 52 && t.clientX < 52 + btnSize + 36 && t.clientY > btnY && t.clientY < btnY + btnSize && e.type === "touchstart") {
      settings.autoFire = !settings.autoFire;
      saveSettings();
      return;
    }
  }

  touchFire = false;
  touchMissile = false;
  for (const t of e.touches) {
    if (t.clientX < W * 0.4) {
      if (!joystickCenter) joystickCenter = { x: t.clientX, y: t.clientY };
      const dx = t.clientX - joystickCenter.x;
      const dy = t.clientY - joystickCenter.y;
      const d = Math.hypot(dx, dy);
      if (d > 5) {
        touchMove.x = dx / Math.max(d, JOYSTICK_RADIUS);
        touchMove.y = dy / Math.max(d, JOYSTICK_RADIUS);
        touchMove.active = true;
      }
    } else {
      if (!aimJoystickCenter) aimJoystickCenter = { x: t.clientX, y: t.clientY };
      const dx = t.clientX - aimJoystickCenter.x;
      const dy = t.clientY - aimJoystickCenter.y;
      const d = Math.hypot(dx, dy);
      if (d > 10) {
        touchAim.x = dx / Math.max(d, JOYSTICK_RADIUS);
        touchAim.y = dy / Math.max(d, JOYSTICK_RADIUS);
        touchAim.active = true;
        touchFire = true;
        if (d > JOYSTICK_RADIUS * 1.3) touchMissile = true;
      } else {
        touchAim.active = false;
        touchFire = false;
      }
    }
  }
}

function handleTouchEnd(e) {
  e.preventDefault();
  if (e.touches.length === 0) {
    touchMove = { x: 0, y: 0, active: false };
    touchAim = { x: 0, y: 0, active: false };
    joystickCenter = null;
    aimJoystickCenter = null;
    touchFire = false;
    touchMissile = false;
  } else {
    let hasLeft = false, hasRight = false;
    for (const t of e.touches) {
      if (t.clientX < W * 0.4) hasLeft = true;
      else hasRight = true;
    }
    if (!hasLeft) { touchMove = { x: 0, y: 0, active: false }; joystickCenter = null; }
    if (!hasRight) { touchAim = { x: 0, y: 0, active: false }; aimJoystickCenter = null; touchFire = false; touchMissile = false; }
  }
}

function handleStatTouch(e) {
  for (const t of e.changedTouches) {
    if (t.clientX < 200 && statPoints > 0) {
      const idx = Math.floor((t.clientY - 80) / 28);
      if (idx >= 0 && idx < 8) allocateStat(idx);
    }
  }
}

let mouseX = 0, mouseY = 0;
let mouseDown = false;
let rightMouseDown = false;
canvas.addEventListener("mousemove", e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener("mousedown", e => {
  if (e.button === 0) mouseDown = true;
  if (e.button === 2) rightMouseDown = true;
});
canvas.addEventListener("mouseup", e => {
  if (e.button === 0) mouseDown = false;
  if (e.button === 2) rightMouseDown = false;
});
canvas.addEventListener("contextmenu", e => e.preventDefault());

/* ===== CAMERA ===== */
const camera = { x: 0, y: 0 };
function updateCamera(target) {
  let cx = target.x - W / 2;
  let cy = target.y - H / 2;
  if (touchAim.active) {
    cx += touchAim.x * W * 0.15;
    cy += touchAim.y * H * 0.15;
  } else if (!("ontouchstart" in window)) {
    cx += (mouseX - W / 2) * 0.12;
    cy += (mouseY - H / 2) * 0.12;
  }
  camera.x = lerp(camera.x, clamp(cx, 0, Math.max(0, WORLD_W - W)), 0.08);
  camera.y = lerp(camera.y, clamp(cy, 0, Math.max(0, WORLD_H - H)), 0.08);
}

/* ===== PARTICLES ===== */
const particles = [];
function spawnParticle(x, y, vx, vy, life, r, color, type) {
  if (particles.length > 600) return;
  particles.push({ x, y, vx, vy, life, maxLife: life, r, color, type: type || "circle" });
}
function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = rand(1, 5);
    spawnParticle(x, y, Math.cos(a) * sp, Math.sin(a) * sp, rand(0.3, 0.9), rand(2, 6), color, "fire");
  }
  for (let i = 0; i < Math.floor(count / 2); i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = rand(0.5, 2);
    spawnParticle(x, y, Math.cos(a) * sp, Math.sin(a) * sp - 0.5, rand(0.5, 1.5), rand(4, 10), "#333", "smoke");
  }
}
function spawnOilSpill(x, y) {
  for (let i = 0; i < 12; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = rand(0.5, 2.5);
    spawnParticle(x, y, Math.cos(a) * sp, Math.sin(a) * sp, rand(0.5, 1.5), rand(3, 8), "#1a0a00", "oil");
  }
}
function spawnMuzzleFlash(x, y, a) {
  for (let i = 0; i < 4; i++) {
    const sa = a + rand(-0.3, 0.3);
    const sp = rand(3, 7);
    spawnParticle(x, y, Math.cos(sa) * sp, Math.sin(sa) * sp, rand(0.05, 0.15), rand(2, 4), "#ffee88", "fire");
  }
}
function spawnEngineTrail(x, y, a) {
  const sa = a + Math.PI + rand(-0.2, 0.2);
  const sp = rand(0.5, 1.5);
  spawnParticle(x, y, Math.cos(sa) * sp, Math.sin(sa) * sp, rand(0.2, 0.5), rand(1, 3), "#557799", "smoke");
}
function spawnLevelUpEffect(x, y) {
  for (let i = 0; i < 24; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = rand(2, 6);
    spawnParticle(x, y, Math.cos(a) * sp, Math.sin(a) * sp, rand(0.5, 1.2), rand(3, 7), pickRandom(["#ffcc00","#44ff88","#44ccff","#ff8844"]), "fire");
  }
}

/* ===== FLOATING TEXT ===== */
const floatingTexts = [];
function spawnFloatingText(x, y, text, color, size) {
  floatingTexts.push({ x, y, text, color, life: 1.5, maxLife: 1.5, size: size || 13 });
}

/* ===== STAT POINT SYSTEM (diep.io) ===== */
let playerLevel = 1;
let playerXP = 0;
let statPoints = 0;
let stats = [0,0,0,0,0,0,0,0];
let showStatPanel = true;

function xpForLevel(lvl) { return Math.floor(40 + lvl * 25 + lvl * lvl * 5); }

function addXP(amount) {
  playerXP += amount;
  while (playerLevel < MAX_LEVEL && playerXP >= xpForLevel(playerLevel)) {
    playerXP -= xpForLevel(playerLevel);
    playerLevel++;
    statPoints++;
    spawnLevelUpEffect(player.x, player.y);
    spawnFloatingText(player.x, player.y - 35, "LEVEL " + playerLevel + "!", "#ffcc00", 18);
    addShake(3);
    addScreenFlash("#ffcc00", 0.15);
    playSound("levelup");
  }
  if (playerLevel >= MAX_LEVEL) playerXP = 0;
}

function allocateStat(idx) {
  if (statPoints <= 0 || idx < 0 || idx >= 8 || stats[idx] >= STAT_MAX) return;
  stats[idx]++;
  statPoints--;
}

function getStatMult(idx) { return stats[idx] / STAT_MAX; }

let upgradeStats = {};
let upgradeLevels = {};
let upgradeChoices = [];
let nextUpgradeScore = UPGRADE_INTERVAL;
let totalUpgrades = 0;

function resetUpgrades() {
  upgradeStats = {
    spreadCount: 1,
    oilMult: 1, hasShield: false, shieldInterval: 15, shieldTimer: 0,
    empRadius: 0, hasEmp: false, critChance: 0, regenRate: 0,
    missileDmgMult: 1, missileSpeedMult: 1,
    extraPierce: 0, orbitalCount: 0, xpMult: 1,
  };
  upgradeLevels = {};
  nextUpgradeScore = UPGRADE_INTERVAL;
  totalUpgrades = 0;
}

function getUpgradeChoices() {
  const pool = Object.keys(UPGRADES).filter(k => (upgradeLevels[k] || 0) < UPGRADES[k].maxLevel);
  const choices = [];
  const p = [...pool];
  for (let i = 0; i < Math.min(3, p.length); i++) {
    const idx = randInt(0, p.length - 1);
    choices.push(p[idx]);
    p.splice(idx, 1);
  }
  return choices;
}

function applyUpgrade(key) {
  upgradeLevels[key] = (upgradeLevels[key] || 0) + 1;
  UPGRADES[key].apply(upgradeLevels[key]);
  totalUpgrades++;
}

function handleUpgradeTouch(e) {
  for (const t of e.changedTouches) handleUpgradeClick(t.clientX, t.clientY);
}

function handleUpgradeClick(mx, my) {
  if (upgradeChoices.length === 0) return;
  const cardW = Math.min(200, W * 0.28);
  const cardH = Math.min(260, H * 0.45);
  const gap = Math.min(30, W * 0.03);
  const totalW2 = upgradeChoices.length * cardW + (upgradeChoices.length - 1) * gap;
  const startX = (W - totalW2) / 2;
  const startY = (H - cardH) / 2;
  for (let i = 0; i < upgradeChoices.length; i++) {
    const cx = startX + i * (cardW + gap);
    if (mx >= cx && mx <= cx + cardW && my >= startY && my <= startY + cardH) {
      applyUpgrade(upgradeChoices[i]);
      upgradeChoices = [];
      gameState = "playing";
      return;
    }
  }
}

/* ===== COMBO & STREAK ===== */
let combo = 0;
let comboTimer = 0;
let killStreak = 0;
let streakTimer = 0;
let maxCombo = 0;
let maxStreak = 0;

function registerKill(scoreVal) {
  combo++;
  comboTimer = COMBO_DECAY;
  killStreak++;
  streakTimer = STREAK_DECAY;
  const mult = 1 + Math.floor(combo / 5) * 0.25;
  const gained = Math.floor(scoreVal * mult);
  score += gained;
  if (combo > maxCombo) maxCombo = combo;
  if (killStreak > maxStreak) maxStreak = killStreak;
  if (combo > 1 && combo % 5 === 0) {
    spawnFloatingText(player.x, player.y - 50, combo + "x COMBO!", "#ff44ff", 16);
    addShake(2);
  }
  if (killStreak > 0 && killStreak % 10 === 0) {
    spawnFloatingText(player.x, player.y - 60, killStreak + " KILL STREAK!", "#ffcc00", 18);
    player.oil = Math.min(getMaxOil(), player.oil + 30);
    addShake(4);
  }
  return gained;
}

/* ===== POWERUP STATE ===== */
let activePowerups = {};
function addPowerup(effect, duration) {
  activePowerups[effect] = (activePowerups[effect] || 0) + duration;
}
function hasPowerup(effect) { return (activePowerups[effect] || 0) > 0; }

/* ===== GAME STATE ===== */
let gameState = "title";
let score = 0;
let waveTimer = 0;
let wantedLevel = 0;
let time = 0;
let rigRecaptureTimer = RIG_RECAPTURE_INTERVAL;
let paused = false;
let timeSurvived = 0;
let totalKills = { drone: 0, plane: 0, chopper: 0, boss: 0 };
let totalDamageTaken = 0;
let totalDamageDealt = 0;

function togglePause() {
  if (gameState === "playing") { paused = !paused; }
  else if (gameState === "paused") { paused = false; gameState = "playing"; }
  if (paused && gameState === "playing") gameState = "paused";
  else if (!paused && gameState === "paused") gameState = "playing";
}

/* ===== COMPUTED STATS (from diep.io points) ===== */
function getMaxOil() { return OIL_BASE_MAX + stats[1] * 120; }
function getHealthRegen() { return stats[0] * 1.5 + upgradeStats.regenRate; }
function getBodyDamage() { return 5 + stats[2] * 8; }
function getBulletSpeed() { return BULLET_BASE_SPEED + stats[3] * 1.2 + (hasPowerup("speed") ? 3 : 0); }
function getBulletPenetration() { return stats[4] + upgradeStats.extraPierce; }
function getBulletDamage() { return 15 + stats[5] * 7 + (hasPowerup("damage") ? 15 : 0); }
function getReloadTime() { return Math.max(0.04, FIRE_BASE_COOLDOWN - stats[6] * 0.022); }
function getMoveSpeed() { return PLAYER_BASE_SPEED + stats[7] * 0.35 + (hasPowerup("speed") ? 1.5 : 0); }
function getPickupRadius() { return PICKUP_RADIUS + (hasPowerup("magnet") ? 200 : 0) + stats[1] * 5; }

/* ===== PROJECTILES ===== */
const bullets = [];
const enemyBullets = [];
const homingMissiles = [];

function fireBullet() {
  const hasDual = player.oil >= DUAL_CANNON_THRESHOLD;
  const spreadCount = upgradeStats.spreadCount;
  const offsets = hasDual ? [-8, 8] : [0];
  const spreadAngle = 0.12;
  const bSpeed = getBulletSpeed();
  const bDmg = getBulletDamage();
  const pierce = getBulletPenetration();
  for (const off of offsets) {
    const perpAngle = player.angle + Math.PI / 2;
    const bx = player.x + Math.cos(perpAngle) * off;
    const by = player.y + Math.sin(perpAngle) * off;
    if (spreadCount > 1) {
      const half = (spreadCount - 1) / 2;
      for (let s = 0; s < spreadCount; s++) {
        const a = player.angle + (s - half) * spreadAngle;
        const isCrit = Math.random() < upgradeStats.critChance;
        bullets.push({ x: bx, y: by, vx: Math.cos(a) * bSpeed, vy: Math.sin(a) * bSpeed, life: 1.8, damage: isCrit ? bDmg * 2 : bDmg, crit: isCrit, pierce: pierce });
      }
    } else {
      const isCrit = Math.random() < upgradeStats.critChance;
      bullets.push({ x: bx, y: by, vx: Math.cos(player.angle) * bSpeed, vy: Math.sin(player.angle) * bSpeed, life: 1.8, damage: isCrit ? bDmg * 2 : bDmg, crit: isCrit, pierce: pierce });
    }
    spawnMuzzleFlash(bx, by, player.angle);
  }
  playSound("shoot");
}

function fireHoming() {
  if (player.oil < HOMING_THRESHOLD) return false;
  const target = findNearestEnemy(player);
  if (!target) return false;
  homingMissiles.push({
    x: player.x, y: player.y, angle: player.angle,
    speed: HOMING_SPEED * upgradeStats.missileSpeedMult, target,
    life: 4, damage: 80 * upgradeStats.missileDmgMult,
  });
  playSound("missile");
  return true;
}

function findNearestEnemy(from) {
  let best = null, bestD = Infinity;
  for (const e of enemies) { const d = dist(from, e); if (d < bestD) { bestD = d; best = e; } }
  return best;
}

/* ===== LOOT DROPS ===== */
const loot = [];
function spawnLoot(x, y, enemy) {
  // Always drop XP
  const xpType = enemy.scoreValue >= 150 ? "xp_large" : enemy.scoreValue >= 100 ? "xp_medium" : "xp_small";
  const a1 = Math.random() * Math.PI * 2;
  loot.push({ ...LOOT_TYPES[xpType], x: x + Math.cos(a1) * 8, y: y + Math.sin(a1) * 8, life: 15, bobPhase: Math.random() * Math.PI * 2 });
  // Chance for oil
  if (Math.random() < 0.35) {
    const ot = Math.random() < 0.3 ? "oil_large" : "oil_small";
    const a2 = Math.random() * Math.PI * 2;
    loot.push({ ...LOOT_TYPES[ot], x: x + Math.cos(a2) * 12, y: y + Math.sin(a2) * 12, life: 15, bobPhase: Math.random() * Math.PI * 2 });
  }
  // Rare powerup
  if (Math.random() < 0.06) {
    const types = ["pow_speed","pow_damage","pow_shield","pow_magnet"];
    const pt = pickRandom(types);
    loot.push({ ...LOOT_TYPES[pt], x, y, life: 20, bobPhase: Math.random() * Math.PI * 2 });
  }
  // Boss drops more
  if (enemy.isBoss) {
    for (let i = 0; i < 5; i++) {
      const a3 = Math.random() * Math.PI * 2;
      const r3 = rand(10, 30);
      loot.push({ ...LOOT_TYPES["xp_large"], x: x + Math.cos(a3) * r3, y: y + Math.sin(a3) * r3, life: 20, bobPhase: Math.random() * Math.PI * 2 });
    }
    loot.push({ ...LOOT_TYPES[pickRandom(["pow_speed","pow_damage","pow_shield","pow_magnet"])], x, y, life: 25, bobPhase: Math.random() * Math.PI * 2 });
  }
}

/* ===== ENEMIES ===== */
const enemies = [];

function getRandomFaction() {
  const weights = { red: 35, blue: 25, yellow: 25, purple: 15 };
  const total = Object.values(weights).reduce((a,b) => a + b, 0);
  let r = Math.random() * total;
  for (const [k, w] of Object.entries(weights)) { r -= w; if (r <= 0) return k; }
  return "red";
}

function spawnDrone(x, y, faction) {
  faction = faction || getRandomFaction();
  const f = FACTIONS[faction];
  const isTanky = faction === "purple";
  const isFast = faction === "yellow";
  enemies.push({
    type: "drone", x, y, vx: 0, vy: 0,
    hp: isTanky ? 60 : 30, maxHp: isTanky ? 60 : 30,
    angle: 0,
    speed: (isFast ? 3.8 : 2.5) + wantedLevel * 0.3,
    damage: DRONE_DAMAGE + (isTanky ? 10 : 0),
    radius: isTanky ? 18 : 14, scoreValue: isTanky ? 80 : 50,
    rotorAngle: Math.random() * Math.PI * 2, stunTimer: 0,
    faction, isBoss: false,
    aiState: "chase", aiTimer: 0,
    retreatAngle: 0,
  });
}

function spawnPlane(edge, faction) {
  faction = faction || getRandomFaction();
  const f = FACTIONS[faction];
  const isFast = faction === "yellow";
  let x, y, ang;
  switch (edge) {
    case 0: x = rand(0, WORLD_W); y = -40; ang = Math.PI / 2 + rand(-0.3, 0.3); break;
    case 1: x = WORLD_W + 40; y = rand(0, WORLD_H); ang = Math.PI + rand(-0.3, 0.3); break;
    case 2: x = rand(0, WORLD_W); y = WORLD_H + 40; ang = -Math.PI / 2 + rand(-0.3, 0.3); break;
    default: x = -40; y = rand(0, WORLD_H); ang = rand(-0.3, 0.3); break;
  }
  enemies.push({
    type: "plane", x, y, vx: 0, vy: 0,
    hp: 50, maxHp: 50, angle: ang,
    speed: (isFast ? 7 : 5) + wantedLevel * 0.4,
    damage: PLANE_DAMAGE,
    radius: 18, scoreValue: 100,
    fireCooldown: 0, propAngle: 0, stunTimer: 0,
    faction, isBoss: false,
    aiState: "flyby", aiTimer: 0,
  });
}

function spawnChopper(x, y, faction) {
  faction = faction || getRandomFaction();
  const f = FACTIONS[faction];
  const isTanky = faction === "purple";
  enemies.push({
    type: "chopper", x, y, vx: 0, vy: 0,
    hp: isTanky ? 140 : 80, maxHp: isTanky ? 140 : 80,
    angle: 0,
    speed: 2 + wantedLevel * 0.2,
    damage: CHOPPER_DAMAGE + (isTanky ? 10 : 0),

    aiState: "orbit", aiTimer: 0,
    orbitDir: Math.random() < 0.5 ? 1 : -1,
  });
}

function spawnBoss(x, y) {
  const faction = pickRandom(FACTION_KEYS);
  enemies.push({
    type: "chopper", x, y, vx: 0, vy: 0,
    hp: 400 + wantedLevel * 100, maxHp: 400 + wantedLevel * 100,
    angle: 0, speed: 1.8,
    damage: 40, radius: 28, scoreValue: 500,
    fireCooldown: 0, rotorAngle: 0, tailRotorAngle: 0, stunTimer: 0,

    aiState: "orbit", aiTimer: 0,
    orbitDir: Math.random() < 0.5 ? 1 : -1,
  });
}

/* ===== WAVE SPAWNER ===== */
function spawnWave(dt) {
  waveTimer -= dt;
  if (waveTimer > 0) return;
  wantedLevel = 0;
  for (let i = WANTED_THRESHOLDS.length - 1; i >= 0; i--) {
    if (player.oil >= WANTED_THRESHOLDS[i]) { wantedLevel = i; break; }
  }
  waveTimer = Math.max(0.8, 3.2 - wantedLevel * 0.5);
  const spawnAngle = Math.random() * Math.PI * 2;
  const sx = clamp(player.x + Math.cos(spawnAngle) * ENEMY_SPAWN_DISTANCE, 50, WORLD_W - 50);
  const sy = clamp(player.y + Math.sin(spawnAngle) * ENEMY_SPAWN_DISTANCE, 50, WORLD_H - 50);
  const roll = Math.random();
  const faction = getRandomFaction();
  if (roll < 0.4) {
    const count = 2 + wantedLevel + (faction === "yellow" ? 2 : 0);
    for (let i = 0; i < count; i++) spawnDrone(sx + rand(-40, 40), sy + rand(-40, 40), faction);
  } else if (roll < 0.7) {
    spawnPlane(randInt(0, 3), faction);
    if (wantedLevel >= 2) spawnPlane(randInt(0, 3), faction);
  } else {
    spawnChopper(sx, sy, faction);
  }
  if (wantedLevel >= BOSS_THRESHOLD && Math.random() < 0.08) {
    spawnBoss(sx + 80, sy + 80);
    spawnFloatingText(player.x, player.y - 40, "⚠ BOSS INCOMING!", "#ff4444", 20);
    addShake(6);
  }
  if (wantedLevel >= 3) spawnChopper(sx + 60, sy + 60, faction);
  if (wantedLevel >= 4) { spawnPlane(randInt(0, 3), faction); spawnPlane(randInt(0, 3), faction); }
}

/* ===== RIG RECAPTURE AI ===== */
function updateRigRecapture(dt) {
  rigRecaptureTimer -= dt;
  if (rigRecaptureTimer > 0) return;
  rigRecaptureTimer = RIG_RECAPTURE_INTERVAL - wantedLevel * 3;
  const playerRigs = rigs.filter(r => r.owner === "player" && r.hp > 0);
  if (playerRigs.length === 0) return;
  const target = pickRandom(playerRigs);
  target.underAttack = true;
  target.attackWarning = 3.0;
  spawnFloatingText(player.x, player.y - 50, "⚠ RIG UNDER ATTACK!", "#ff4444", 16);
  const faction = getRandomFaction();
  const count = 3 + wantedLevel;
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const d = rand(200, 350);
    const ex = clamp(target.x + Math.cos(a) * d, 50, WORLD_W - 50);
    const ey = clamp(target.y + Math.sin(a) * d, 50, WORLD_H - 50);
    if (i < count - 1) {
      spawnDrone(ex, ey, faction);
      enemies[enemies.length - 1].targetRig = target;
    } else {
      spawnChopper(ex, ey, faction);
      enemies[enemies.length - 1].targetRig = target;
    }
  }
}

/* ===== UPDATE ===== */
function update(dt) {
  time += dt;
  timeSurvived += dt;
  // Combo/streak decay
  comboTimer -= dt; if (comboTimer <= 0) { combo = 0; comboTimer = 0; }
  streakTimer -= dt; if (streakTimer <= 0) { killStreak = 0; streakTimer = 0; }
  // Powerup timers
  for (const k in activePowerups) { activePowerups[k] -= dt; if (activePowerups[k] <= 0) delete activePowerups[k]; }
  // Screen effects decay
  screenFlash.alpha *= 0.92; if (screenFlash.alpha < 0.01) screenFlash.alpha = 0;
  vignetteIntensity *= 0.95; if (vignetteIntensity < 0.01) vignetteIntensity = 0;

  // Player movement
  let ix = 0, iy = 0;
  if (keys["KeyW"] || keys["ArrowUp"]) iy -= 1;
  if (keys["KeyS"] || keys["ArrowDown"]) iy += 1;
  if (keys["KeyA"] || keys["ArrowLeft"]) ix -= 1;
  if (keys["KeyD"] || keys["ArrowRight"]) ix += 1;
  if (touchMove.active) { ix = touchMove.x; iy = touchMove.y; }
  const inputLen = Math.hypot(ix, iy);
  if (inputLen > 0.01) { ix /= inputLen; iy /= inputLen; }

  // Dash mechanic
  player.dashCooldown -= dt;
  if (player.dashing > 0) {
    player.dashing -= dt;
    const dashSpd = DASH_SPEED * (player.dashing / DASH_DURATION);
    player.vx = Math.cos(player.dashAngle) * dashSpd;
    player.vy = Math.sin(player.dashAngle) * dashSpd;
    player.invincible = Math.max(player.invincible, 0.05);
    // Dash trail particles
    for (let i = 0; i < 2; i++) {
      spawnParticle(player.x + rand(-5, 5), player.y + rand(-5, 5), rand(-1, 1), rand(-1, 1), rand(0.1, 0.3), rand(2, 5), "#44ccff", "fire");
    }
  } else {
    const speed = Math.max(1, getMoveSpeed() - (player.oil / getMaxOil()) * 1.2);
    player.vx = lerp(player.vx, ix * speed, 0.15);
    player.vy = lerp(player.vy, iy * speed, 0.15);
  }
  // Trigger dash
  if ((keys["ShiftLeft"] || keys["ShiftRight"]) && player.dashCooldown <= 0 && inputLen > 0.1 && player.dashing <= 0) {
    player.dashing = DASH_DURATION;
    player.dashAngle = Math.atan2(iy, ix);
    player.dashCooldown = DASH_COOLDOWN;
    playSound("dash");
    addScreenFlash("#44ccff", 0.1);
  }

  player.x = clamp(player.x + player.vx, 20, WORLD_W - 20);
  player.y = clamp(player.y + player.vy, 20, WORLD_H - 20);
  player.engineGlow = lerp(player.engineGlow, inputLen > 0.1 ? 1 : 0.2, 0.1);
  if (inputLen > 0.1 && Math.random() < 0.5) spawnEngineTrail(player.x - Math.cos(player.angle) * 14, player.y - Math.sin(player.angle) * 14, player.angle);

  // Aiming - twin stick on mobile, mouse on desktop
  if (touchAim.active) {
    player.angle = Math.atan2(touchAim.y, touchAim.x);
  } else if (touchMove.active && !touchAim.active && inputLen > 0.01) {
    player.angle = Math.atan2(iy, ix);
  } else if (!touchMove.active) {
    player.angle = Math.atan2(mouseY + camera.y - player.y, mouseX + camera.x - player.x);
  }

  player.rotorAngle += dt * 25;
  player.tailRotorAngle += dt * 35;
  if (player.invincible > 0) player.invincible -= dt;

  // Shield
  if (upgradeStats.hasShield) {
    player.shieldTimer -= dt;
    if (player.shieldTimer <= 0) { player.shieldActive = true; player.shieldTimer = upgradeStats.shieldInterval; }
  }
  if (hasPowerup("shield") && !player.shieldActive) { player.shieldActive = true; }

  // Health regen (stat-based + upgrade)
  const regen = getHealthRegen();
  if (regen > 0) player.oil = Math.min(getMaxOil(), player.oil + regen * dt);

  // Firing
  player.fireCooldown -= dt;
  player.homingCooldown -= dt;
  const wantFire = keys["Space"] || mouseDown || touchFire || settings.autoFire;
  const wantMissile = keys["KeyE"] || rightMouseDown || touchMissile;
  if (wantFire && player.fireCooldown <= 0) { fireBullet(); player.fireCooldown = getReloadTime(); }
  if (wantMissile && player.homingCooldown <= 0 && player.oil >= HOMING_THRESHOLD) { if (fireHoming()) player.homingCooldown = HOMING_COOLDOWN_MS / 1000; }

  // Orbital auto-turrets
  if (upgradeStats.orbitalCount > 0) {
    for (let o = 0; o < upgradeStats.orbitalCount; o++) {
      const oa = time * 2.5 + o * Math.PI;
      const ox = player.x + Math.cos(oa) * 40;
      const oy = player.y + Math.sin(oa) * 40;
      if (Math.random() < dt * 3) {
        const target = findNearestEnemy({ x: ox, y: oy });
        if (target && dist({ x: ox, y: oy }, target) < 300) {
          const ta = angle({ x: ox, y: oy }, target);
          bullets.push({ x: ox, y: oy, vx: Math.cos(ta) * 8, vy: Math.sin(ta) * 8, life: 1, damage: 10, crit: false, pierce: 0 });
        }
      }
    }
  }

  // Oil rigs
  for (const rig of rigs) {
    if (rig.hp <= 0) {
      rig.owner = "neutral";
      rig.enemyCaptureProgress = 0;
      continue;
    }
    rig.flamePhase += dt * 4;
    rig.craneAngle += dt * 0.8;
    if (rig.attackWarning > 0) rig.attackWarning -= dt;
    else rig.underAttack = false;

    if (dist(player, rig) < CAPTURE_RADIUS && rig.owner !== "player") {
      rig.captureProgress += dt;
      rig.enemyCaptureProgress = 0;
      if (rig.captureProgress >= CAPTURE_TIME) {
        rig.owner = "player"; rig.captureProgress = 0; rig.hp = rig.maxHp;
        const gained = 200;
        score += gained;
        addXP(50);
        spawnFloatingText(rig.x, rig.y - 30, "+200 CAPTURED", "#44ff88");
      }
    } else if (rig.owner !== "player") {
      rig.captureProgress = Math.max(0, rig.captureProgress - dt * 0.5);
    }
    if (rig.owner === "player" && player.oil < getMaxOil()) {
      player.oil = Math.min(getMaxOil(), player.oil + OIL_PER_SECOND * upgradeStats.oilMult * dt);
    }
  }

  // Rig recapture
  updateRigRecapture(dt);

  // Spawn enemies
  spawnWave(dt);

  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.stunTimer > 0) { e.stunTimer -= dt; if (e.type === "drone") e.rotorAngle += dt * 10; continue; }

    const f = FACTIONS[e.faction] || FACTIONS.red;
    const hasTarget = e.targetRig && e.targetRig.owner === "player" && e.targetRig.hp > 0;
    const chaseTarget = hasTarget ? e.targetRig : player;

    if (e.type === "drone") {
      e.rotorAngle += dt * 30;
      const dToTarget = dist(e, chaseTarget);

      // AI based on faction
      if (f.style === "tactical") {
        // Strafe around target
        e.aiTimer -= dt;
        if (e.aiTimer <= 0) { e.aiState = e.aiState === "strafe_left" ? "strafe_right" : "strafe_left"; e.aiTimer = rand(1, 3); }
        const a = angle(e, chaseTarget);
        const strafeDir = e.aiState === "strafe_left" ? Math.PI / 2 : -Math.PI / 2;
        if (dToTarget > 80) {
          e.vx = lerp(e.vx, Math.cos(a) * e.speed * 0.7 + Math.cos(a + strafeDir) * e.speed * 0.5, 0.06);
          e.vy = lerp(e.vy, Math.sin(a) * e.speed * 0.7 + Math.sin(a + strafeDir) * e.speed * 0.5, 0.06);
        } else {
          e.vx = lerp(e.vx, Math.cos(a + strafeDir) * e.speed, 0.06);
          e.vy = lerp(e.vy, Math.sin(a + strafeDir) * e.speed, 0.06);
        }
      } else if (f.style === "fast") {
        // Hit-and-run
        e.aiTimer -= dt;
        if (dToTarget < 60 && e.aiState === "chase") { e.aiState = "retreat"; e.aiTimer = 1.5; e.retreatAngle = angle(chaseTarget, e) + rand(-0.5, 0.5); }
        if (e.aiTimer <= 0 && e.aiState === "retreat") { e.aiState = "chase"; e.aiTimer = 2; }
        if (e.aiState === "retreat") {
          e.vx = lerp(e.vx, Math.cos(e.retreatAngle) * e.speed * 1.3, 0.1);
          e.vy = lerp(e.vy, Math.sin(e.retreatAngle) * e.speed * 1.3, 0.1);
        } else {
          const a = angle(e, chaseTarget);
          e.vx = lerp(e.vx, Math.cos(a) * e.speed, 0.1);
          e.vy = lerp(e.vy, Math.sin(a) * e.speed, 0.1);
        }
      } else if (f.style === "tanky") {
        // Slow but relentless
        const a = angle(e, chaseTarget);
        e.vx = lerp(e.vx, Math.cos(a) * e.speed * 0.7, 0.04);
        e.vy = lerp(e.vy, Math.sin(a) * e.speed * 0.7, 0.04);
      } else {
        // Aggressive (red) - direct charge
        const a = angle(e, chaseTarget);
        e.vx = lerp(e.vx, Math.cos(a) * e.speed, 0.08);
        e.vy = lerp(e.vy, Math.sin(a) * e.speed, 0.08);
      }
      e.x += e.vx; e.y += e.vy;
      e.x = clamp(e.x, 10, WORLD_W - 10);
      e.y = clamp(e.y, 10, WORLD_H - 10);
      e.angle = Math.atan2(e.vy, e.vx);

      // Collision with player
      if (dist(e, player) < 28 && player.invincible <= 0) {
        damagePlayer(e.damage);
        // Body damage back to enemy
        e.hp -= getBodyDamage();
        if (e.hp > 0) { spawnExplosion(e.x, e.y, f.accent, 8); }
        else { spawnExplosion(e.x, e.y, f.accent, 12); }
        addShake(4);
      }
    }

    if (e.type === "plane") {
      e.propAngle = (e.propAngle || 0) + dt * 40;
      // Smarter plane AI: turn towards player when far
      if (f.style === "tactical") {
        const desired = angle(e, chaseTarget);
        let diff = desired - e.angle;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        e.angle += clamp(diff, -0.02, 0.02);
      }
      e.x += Math.cos(e.angle) * e.speed;
      e.y += Math.sin(e.angle) * e.speed;
      if (Math.random() < 0.3) spawnEngineTrail(e.x - Math.cos(e.angle) * 12, e.y - Math.sin(e.angle) * 12, e.angle);
      e.fireCooldown -= dt;
      if (e.fireCooldown <= 0 && dist(e, player) < 500) {
        const a = angle(e, player);
        const bspd = f.style === "fast" ? 8 : 6;
        enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * bspd, vy: Math.sin(a) * bspd, life: 2, damage: e.damage, color: f.accent });
        e.fireCooldown = f.style === "fast" ? 0.5 : 0.8;
      }
      if (e.x < -100 || e.x > WORLD_W + 100 || e.y < -100 || e.y > WORLD_H + 100) { enemies.splice(i, 1); continue; }
    }

    if (e.type === "chopper") {
      const d = dist(e, chaseTarget); const a = angle(e, chaseTarget);
      e.rotorAngle += dt * 22; e.tailRotorAngle += dt * 35;

      if (f.style === "tactical") {
        // Circle strafe
        const orbitAngle = a + (e.orbitDir || 1) * Math.PI / 2;
        if (d > 250) { e.vx = lerp(e.vx, Math.cos(a) * e.speed, 0.04); e.vy = lerp(e.vy, Math.sin(a) * e.speed, 0.04); }
        else if (d < 150) { e.vx = lerp(e.vx, -Math.cos(a) * e.speed, 0.04); e.vy = lerp(e.vy, -Math.sin(a) * e.speed, 0.04); }
        else { e.vx = lerp(e.vx, Math.cos(orbitAngle) * e.speed, 0.04); e.vy = lerp(e.vy, Math.sin(orbitAngle) * e.speed, 0.04); }
      } else {
        if (d > 200) { e.vx = lerp(e.vx, Math.cos(a) * e.speed, 0.05); e.vy = lerp(e.vy, Math.sin(a) * e.speed, 0.05); }
        else if (d < 120) { e.vx = lerp(e.vx, -Math.cos(a) * e.speed, 0.05); e.vy = lerp(e.vy, -Math.sin(a) * e.speed, 0.05); }
        else { e.vx = lerp(e.vx, Math.cos(a + Math.PI / 2) * e.speed * 0.5, 0.05); e.vy = lerp(e.vy, Math.sin(a + Math.PI / 2) * e.speed * 0.5, 0.05); }
      }
      e.x = clamp(e.x + e.vx, 20, WORLD_W - 20);
      e.y = clamp(e.y + e.vy, 20, WORLD_H - 20);
      e.angle = a;
      e.fireCooldown -= dt;
      const fireRange = e.isBoss ? 500 : 400;
      const fireRate = e.isBoss ? 0.5 : (1.2 - wantedLevel * 0.1);
      if (e.fireCooldown <= 0 && dist(e, player) < fireRange) {
        const pa = angle(e, player);
        enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(pa) * 5, vy: Math.sin(pa) * 5, life: 2.5, damage: e.damage, color: FACTIONS[e.faction].accent });
        if (e.isBoss) {
          // Boss fires spread
          enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(pa + 0.15) * 5, vy: Math.sin(pa + 0.15) * 5, life: 2.5, damage: e.damage, color: FACTIONS[e.faction].accent });
          enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(pa - 0.15) * 5, vy: Math.sin(pa - 0.15) * 5, life: 2.5, damage: e.damage, color: FACTIONS[e.faction].accent });
        }
        e.fireCooldown = fireRate;
      }
    }

    // Enemy attacks on player rigs
    for (const rig of rigs) {
      if (rig.owner === "player" && rig.hp > 0 && dist(e, rig) < 60) {
        rig.hp -= 10 * dt;
        rig.underAttack = true;
        rig.attackWarning = 2.0;
        if (rig.hp <= 0) {
          rig.owner = "neutral"; rig.hp = 0;
          spawnExplosion(rig.x, rig.y, "#ff8800", 25);
          spawnFloatingText(rig.x, rig.y - 30, "RIG LOST!", "#ff4444", 16);
          addShake(6);
        }
      }
      // Enemy captures neutral rigs
      if (rig.owner === "neutral" && rig.hp <= 0 && e.targetRig === rig && dist(e, rig) < CAPTURE_RADIUS) {
        rig.enemyCaptureProgress += dt;
        if (rig.enemyCaptureProgress >= CAPTURE_TIME * 2) {
          rig.owner = "enemy"; rig.hp = rig.maxHp; rig.enemyCaptureProgress = 0;
          spawnFloatingText(rig.x, rig.y - 30, "RIG CAPTURED BY ENEMY!", "#ff4444", 14);
        }
      }
    }

    if (e.hp <= 0) {
      spawnExplosion(e.x, e.y, FACTIONS[e.faction].accent, e.isBoss ? 30 : 18);
      const gained = registerKill(e.scoreValue);
      const xpGain = Math.floor((e.scoreValue * 0.5 + (e.isBoss ? 100 : 0)) * upgradeStats.xpMult);
      addXP(xpGain);
      player.oil = Math.min(getMaxOil(), player.oil + 8 * upgradeStats.oilMult);
      spawnFloatingText(e.x, e.y - 20, "+" + gained, "#ffcc00");
      spawnLoot(e.x, e.y, e);
      addShake(e.isBoss ? 8 : 3);
      playSound("explosion", e.isBoss ? 0.5 : 0.3);
      totalDamageDealt += e.maxHp;
      if (e.isBoss) totalKills.boss++;
      else totalKills[e.type] = (totalKills[e.type] || 0) + 1;
      enemies.splice(i, 1);
    }
  }

  // Player bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy; b.life -= dt;
    if (b.life <= 0 || b.x < 0 || b.x > WORLD_W || b.y < 0 || b.y > WORLD_H) { bullets.splice(i, 1); continue; }
    for (let j = enemies.length - 1; j >= 0; j--) {
      if (dist(b, enemies[j]) < enemies[j].radius + 6) {
        enemies[j].hp -= b.damage;
        if (b.crit) { spawnExplosion(b.x, b.y, "#ff0000", 6); spawnFloatingText(b.x, b.y - 10, "CRIT!", "#ff4444"); playSound("explosion", 0.15); }
        else spawnExplosion(b.x, b.y, "#ffcc00", 4);
        if (b.pierce > 0) { b.pierce--; b.damage *= 0.7; }
        else { bullets.splice(i, 1); break; }
      }
    }
  }

  // Homing missiles
  for (let i = homingMissiles.length - 1; i >= 0; i--) {
    const m = homingMissiles[i];
    m.life -= dt;
    if (m.life <= 0) { spawnExplosion(m.x, m.y, "#ff6600", 8); homingMissiles.splice(i, 1); continue; }
    if (m.target && m.target.hp > 0) {
      const desired = Math.atan2(m.target.y - m.y, m.target.x - m.x);
      let diff = desired - m.angle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      m.angle += clamp(diff, -HOMING_TURN, HOMING_TURN);
    } else m.target = findNearestEnemy(m);
    m.x += Math.cos(m.angle) * m.speed;
    m.y += Math.sin(m.angle) * m.speed;
    for (let t = 0; t < 2; t++) {
      const tx = m.x - Math.cos(m.angle) * (6 + t * 4);
      const ty = m.y - Math.sin(m.angle) * (6 + t * 4);
      spawnParticle(tx + rand(-2, 2), ty + rand(-2, 2), rand(-0.5, 0.5), rand(-0.5, 0.5), rand(0.1, 0.3), rand(2, 4), t === 0 ? "#ff6600" : "#ff3300", "fire");
    }
    for (let j = enemies.length - 1; j >= 0; j--) {
      if (dist(m, enemies[j]) < enemies[j].radius + 10) { enemies[j].hp -= m.damage; spawnExplosion(m.x, m.y, "#ff8800", 15); addShake(5); playSound("explosion", 0.4); homingMissiles.splice(i, 1); break; }
    }
  }

  // Enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy; b.life -= dt;
    if (b.life <= 0) { enemyBullets.splice(i, 1); continue; }
    if (dist(b, player) < 18 && player.invincible <= 0) { damagePlayer(b.damage); enemyBullets.splice(i, 1); }
  }

  // Loot pickup
  const pickR = getPickupRadius();
  const magnetR = MAGNET_RADIUS + (hasPowerup("magnet") ? 200 : 0);
  for (let i = loot.length - 1; i >= 0; i--) {
    const l = loot[i];
    l.life -= dt;
    l.bobPhase += dt * 3;
    if (l.life <= 0) { loot.splice(i, 1); continue; }
    const d = dist(l, player);
    // Magnet pull
    if (d < magnetR && d > pickR) {
      const a = angle(l, player);
      const pullSpeed = 3 + (magnetR - d) / magnetR * 8;
      l.x += Math.cos(a) * pullSpeed;
      l.y += Math.sin(a) * pullSpeed;
    }
    if (d < pickR) {
      if (l.type === "xp") {
        addXP(Math.floor(l.value * upgradeStats.xpMult));
        spawnFloatingText(l.x, l.y - 10, "+" + l.value + " XP", "#44ffcc", 10);
        playSound("pickup", 0.15);
      } else if (l.type === "oil") {
        player.oil = Math.min(getMaxOil(), player.oil + l.value * upgradeStats.oilMult);
        spawnFloatingText(l.x, l.y - 10, "+" + l.value + " OIL", "#888", 10);
        playSound("pickup", 0.15);
      } else if (l.type === "powerup") {
        addPowerup(l.effect, l.duration);
        spawnFloatingText(l.x, l.y - 15, l.label, l.color, 16);
        addShake(3);
        spawnExplosion(l.x, l.y, l.color, 10);
        playSound("powerup", 0.3);
        addScreenFlash(l.color, 0.12);
      }
      loot.splice(i, 1);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.95; p.vy *= 0.95;
    if (p.type === "smoke") p.vy -= 0.02;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].y -= 30 * dt;
    floatingTexts[i].life -= dt;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }

  shakeAmount *= 0.9;
  if (shakeAmount < 0.1) shakeAmount = 0;
  updateCamera(player);

  // Upgrade check
  if (score >= nextUpgradeScore) {
    nextUpgradeScore += UPGRADE_INTERVAL + totalUpgrades * 100;
    upgradeChoices = getUpgradeChoices();
    if (upgradeChoices.length > 0) gameState = "upgrade";
  }

  // Death
  if (player.oil <= 0) {
    player.oil = 0; player.alive = false; gameState = "gameover";
    spawnExplosion(player.x, player.y, "#ff2200", 40);
    addShake(12);
    addScreenFlash("#ff0000", 0.4);
    playSound("explosion", 0.6);
    saveHighScore(score);
  }
}

function damagePlayer(amount) {
  if (player.invincible > 0) return;
  if (player.shieldActive) {
    player.shieldActive = false;
    spawnExplosion(player.x, player.y, "#aa44ff", 10);
    spawnFloatingText(player.x, player.y - 25, "SHIELD!", "#aa44ff");
    player.invincible = 0.3;
    playSound("hit");
    addScreenFlash("#aa44ff", 0.1);
    return;
  }
  // Armor from max health stat reduces damage slightly
  const armorMult = Math.max(0.4, 1 - stats[1] * 0.05);
  const actualDmg = amount * armorMult;
  player.oil -= actualDmg;
  totalDamageTaken += actualDmg;
  player.invincible = 0.5;
  spawnOilSpill(player.x, player.y);
  addShake(4);
  playSound("hit");
  addScreenFlash("#ff0000", 0.15);
  vignetteIntensity = Math.min(0.5, vignetteIntensity + 0.2);
  if (upgradeStats.hasEmp) {
    for (const e of enemies) {
      if (dist(player, e) < upgradeStats.empRadius) { e.stunTimer = 1.5; spawnExplosion(e.x, e.y, "#44ffff", 6); }
    }
  }
  // Body damage to nearby enemies
  if (stats[2] > 0) {
    for (const e of enemies) {
      if (dist(player, e) < 35) { e.hp -= getBodyDamage() * 0.5; spawnExplosion(e.x, e.y, "#cc66ff", 4); }
    }
  }
}

/* ===== DRAW ===== */
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (shakeAmount > 0) ctx.translate(rand(-shakeAmount, shakeAmount), rand(-shakeAmount, shakeAmount));
  ctx.translate(-camera.x, -camera.y);
  drawWater();
  drawRigs();
  drawLoot();
  drawShadows();
  drawEnemies();
  drawBullets();
  drawOrbitals();
  drawPlayer();
  drawParticles();
  drawFloatingTexts();
  ctx.restore();
  drawHUD();
  drawStatPanel();
  drawTouchControls();
  drawScreenEffects();
}

function drawScreenEffects() {
  // Screen flash
  if (screenFlash.alpha > 0.01) {
    ctx.globalAlpha = screenFlash.alpha;
    ctx.fillStyle = screenFlash.color;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
  // Damage vignette
  if (vignetteIntensity > 0.01) {
    const grad = ctx.createRadialGradient(W / 2, H / 2, W * 0.3, W / 2, H / 2, W * 0.7);
    grad.addColorStop(0, "rgba(0,0,0,0)");
    grad.addColorStop(1, "rgba(180,0,0," + vignetteIntensity + ")");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
  // Dash cooldown indicator
  if (player.dashCooldown > 0 && player.alive) {
    const dashPct = 1 - player.dashCooldown / DASH_COOLDOWN;
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.fillRect(W / 2 - 30, H - 18, 60, 8);
    ctx.fillStyle = dashPct >= 1 ? "#44ccff" : "#225577";
    ctx.fillRect(W / 2 - 30, H - 18, 60 * dashPct, 8);
    ctx.font = "7px monospace"; ctx.fillStyle = "#88ccff"; ctx.textAlign = "center";
    ctx.fillText("DASH [SHIFT]", W / 2, H - 22);
  } else if (player.alive) {
    ctx.font = "7px monospace"; ctx.fillStyle = "rgba(68,204,255,0.5)"; ctx.textAlign = "center";
    ctx.fillText("DASH READY [SHIFT]", W / 2, H - 10);
  }
}

function drawWater() {
  // Day/night cycle
  const dayPhase = (time % DAY_NIGHT_CYCLE) / DAY_NIGHT_CYCLE;
  const dayBrightness = 0.7 + 0.3 * Math.cos(dayPhase * Math.PI * 2);
  const nightTint = Math.max(0, Math.sin(dayPhase * Math.PI * 2 - Math.PI) * 0.3);

  const sx = Math.floor(camera.x / TILE), sy = Math.floor(camera.y / TILE);
  const ex = Math.ceil((camera.x + W) / TILE), ey = Math.ceil((camera.y + H) / TILE);
  for (let y = sy; y <= ey; y++) {
    for (let x = sx; x <= ex; x++) {
      const w = Math.sin(time * 1.5 + x * 0.5 + y * 0.3) * 0.02;
      const base = (x + y) % 2 === 0 ? 0.15 : 0.18;
      const r = clamp(Math.floor(((0.04 + w) * dayBrightness + nightTint * 0.1) * 255), 0, 255);
      const g = clamp(Math.floor(((base + w) * dayBrightness) * 255), 0, 255);
      const b = clamp(Math.floor(((0.35 + base + w) * dayBrightness + nightTint * 0.15) * 255), 0, 255);
      ctx.fillStyle = "rgb(" + r + "," + g + "," + b + ")";
      ctx.fillRect(x * TILE, y * TILE, TILE + 1, TILE + 1);
    }
  }
  ctx.globalAlpha = 0.06 * dayBrightness; ctx.fillStyle = "#88ccff";
  for (let y = sy; y <= ey; y += 2) { ctx.fillRect(sx * TILE + Math.sin(time * 2 + y * 0.4) * 20, y * TILE, (ex - sx) * TILE, 3); }
  ctx.globalAlpha = 0.04;
  for (let i = 0; i < 12; i++) {
    const cx2 = camera.x + (Math.sin(time * 0.3 + i * 2.1) * 0.5 + 0.5) * W;
    const cy2 = camera.y + (Math.cos(time * 0.2 + i * 1.7) * 0.5 + 0.5) * H;
    ctx.fillStyle = "#aaddff"; ctx.beginPath(); ctx.arc(cx2, cy2, 30 + Math.sin(time + i) * 15, 0, Math.PI * 2); ctx.fill();
  }
  // Night stars
  if (nightTint > 0.05) {
    ctx.globalAlpha = nightTint * 0.8;
    for (let i = 0; i < 20; i++) {
      const starX = camera.x + ((i * 137.5 + 50) % W);
      const starY = camera.y + ((i * 97.3 + 30) % H);
      const twinkle = 0.5 + Math.sin(time * 2 + i * 1.3) * 0.5;
      ctx.fillStyle = "rgba(255,255,220," + twinkle + ")";
      ctx.beginPath(); ctx.arc(starX, starY, 1 + twinkle, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawShadows() {
  ctx.globalAlpha = 0.12; ctx.fillStyle = "#000";
  if (player.alive) { ctx.beginPath(); ctx.ellipse(player.x + 6, player.y + 10, 18, 10, 0.2, 0, Math.PI * 2); ctx.fill(); }
  for (const e of enemies) {
    const r = e.isBoss ? 20 : e.type === "drone" ? 10 : e.type === "plane" ? 16 : 14;
    ctx.beginPath(); ctx.ellipse(e.x + 5, e.y + 8, r, r * 0.6, 0.15, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawRigs() {
  for (const rig of rigs) {
    if (rig.hp <= 0 && rig.owner !== "enemy") {
      ctx.save(); ctx.translate(rig.x, rig.y);
      ctx.fillStyle = "#222"; ctx.fillRect(-18, -18, 36, 36);
      ctx.fillStyle = "#333"; ctx.fillRect(-12, -12, 8, 24); ctx.fillRect(2, -8, 10, 16);
      ctx.globalAlpha = 0.15; ctx.fillStyle = "#444"; ctx.beginPath(); ctx.arc(0, -20, 10, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1; ctx.restore(); continue;
    }
    ctx.save(); ctx.translate(rig.x, rig.y);
    // Water ring
    ctx.strokeStyle = "rgba(100,200,255,0.15)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, 32 + Math.sin(time * 2 + rig.flamePhase) * 3, 0, Math.PI * 2); ctx.stroke();
    // Legs
    ctx.fillStyle = "#555"; ctx.fillRect(-26, -26, 4, 52); ctx.fillRect(22, -26, 4, 52); ctx.fillRect(-26, -26, 52, 4); ctx.fillRect(-26, 22, 52, 4);
    // Deck
    const deckColor = rig.owner === "player" ? "#2a6644" : rig.owner === "enemy" ? "#662222" : "#4a4a4a";
    ctx.fillStyle = deckColor;
    ctx.fillRect(-22, -22, 44, 44);
    // Grid
    const gridColor = rig.owner === "player" ? "rgba(68,255,136,0.2)" : rig.owner === "enemy" ? "rgba(255,68,68,0.2)" : "rgba(255,255,255,0.1)";
    ctx.strokeStyle = gridColor; ctx.lineWidth = 0.5;
    for (let gx = -20; gx <= 20; gx += 10) { ctx.beginPath(); ctx.moveTo(gx, -22); ctx.lineTo(gx, 22); ctx.stroke(); }
    for (let gy = -20; gy <= 20; gy += 10) { ctx.beginPath(); ctx.moveTo(-22, gy); ctx.lineTo(22, gy); ctx.stroke(); }
    // Derrick
    ctx.strokeStyle = "#999"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-6, 0); ctx.lineTo(-3, -28); ctx.lineTo(3, -28); ctx.lineTo(6, 0); ctx.stroke();
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-5, -7); ctx.lineTo(5, -14); ctx.moveTo(5, -7); ctx.lineTo(-5, -14); ctx.moveTo(-4, -18); ctx.lineTo(4, -24); ctx.moveTo(4, -18); ctx.lineTo(-4, -24); ctx.stroke();
    // Crane
    ctx.save(); ctx.translate(10, -5); ctx.rotate(Math.sin(rig.craneAngle) * 0.3);
    ctx.strokeStyle = "#888"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(18, -12); ctx.stroke();
    ctx.strokeStyle = "#666"; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(18, -12); ctx.lineTo(18, -2 + Math.sin(time * 3) * 2); ctx.stroke();
    ctx.restore();
    // Flame
    const fs = 4 + Math.sin(rig.flamePhase) * 2;
    ctx.globalAlpha = 0.15; ctx.fillStyle = "#ff6600"; ctx.beginPath(); ctx.arc(0, -30, fs * 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1; ctx.fillStyle = "#ff4400"; ctx.beginPath(); ctx.arc(0, -30, fs, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#ffcc00"; ctx.beginPath(); ctx.arc(0, -30, fs * 0.5, 0, Math.PI * 2); ctx.fill();
    if (rig.owner === "player") {
      ctx.strokeStyle = "rgba(68,255,136,0.4)"; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, 8, 10, 0, Math.PI * 2); ctx.stroke();

      ctx.strokeStyle = "rgba(68,255,136," + (0.3 + Math.sin(time * 3) * 0.15) + ")"; ctx.lineWidth = 2; ctx.strokeRect(-24, -24, 48, 48);
    }
    if (rig.owner === "enemy") {
      ctx.strokeStyle = "rgba(255,68,68," + (0.3 + Math.sin(time * 3) * 0.15) + ")"; ctx.lineWidth = 2; ctx.strokeRect(-24, -24, 48, 48);
      ctx.font = "bold 8px monospace"; ctx.fillStyle = "rgba(255,68,68,0.5)"; ctx.textAlign = "center"; ctx.fillText("E", 0, 12);
    }

    }
  }
}

function drawLoot() {
  for (const l of loot) {
    const bob = Math.sin(l.bobPhase) * 2;
    const alpha = l.life < 3 ? l.life / 3 : 1;
    ctx.globalAlpha = alpha * 0.3;
    ctx.fillStyle = l.glow;
    ctx.beginPath(); ctx.arc(l.x, l.y + bob, l.radius * 2, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = l.color;
    if (l.type === "powerup") {
      // Star shape for powerups
      ctx.save(); ctx.translate(l.x, l.y + bob); ctx.rotate(time * 2);
      ctx.beginPath();
      for (let s = 0; s < 5; s++) {
        const a1 = (s / 5) * Math.PI * 2 - Math.PI / 2;
        const a2 = ((s + 0.5) / 5) * Math.PI * 2 - Math.PI / 2;
        if (s === 0) ctx.moveTo(Math.cos(a1) * l.radius, Math.sin(a1) * l.radius);
        else ctx.lineTo(Math.cos(a1) * l.radius, Math.sin(a1) * l.radius);
        ctx.lineTo(Math.cos(a2) * l.radius * 0.5, Math.sin(a2) * l.radius * 0.5);
      }
      ctx.closePath(); ctx.fill();
      ctx.restore();
    } else if (l.type === "oil") {
      ctx.beginPath(); ctx.arc(l.x, l.y + bob, l.radius, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#666"; ctx.lineWidth = 1; ctx.stroke();
    } else {
      // XP gems - diamond shape
      ctx.save(); ctx.translate(l.x, l.y + bob); ctx.rotate(Math.PI / 4);
      ctx.fillRect(-l.radius * 0.6, -l.radius * 0.6, l.radius * 1.2, l.radius * 1.2);
      ctx.restore();
    }
  }
  ctx.globalAlpha = 1;
}

function drawOrbitals() {
  if (upgradeStats.orbitalCount <= 0) return;
  for (let o = 0; o < upgradeStats.orbitalCount; o++) {
    const oa = time * 2.5 + o * Math.PI;
    const ox = player.x + Math.cos(oa) * 40;
    const oy = player.y + Math.sin(oa) * 40;
    ctx.globalAlpha = 0.3; ctx.fillStyle = "#66ccff"; ctx.beginPath(); ctx.arc(ox, oy, 8, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.8; ctx.fillStyle = "#aaddff"; ctx.beginPath(); ctx.arc(ox, oy, 4, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawPlayer() {
  if (!player.alive) return;
  const px = player.x, py = player.y, a = player.angle;
  // Dash afterimage effect
  if (player.dashing > 0) {
    ctx.globalAlpha = 0.15;
    for (let g = 1; g <= 3; g++) {
      const gx = px - Math.cos(player.dashAngle) * g * 8;
      const gy = py - Math.sin(player.dashAngle) * g * 8;
      ctx.fillStyle = "#44ccff";
      ctx.beginPath(); ctx.arc(gx, gy, 12 - g * 2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  ctx.save(); ctx.translate(px, py); ctx.rotate(a);
  if (player.invincible > 0 && Math.sin(time * 30) > 0) ctx.globalAlpha = 0.4;
  if (player.dashing > 0) ctx.globalAlpha = 0.7;
  // Tail
  ctx.fillStyle = "#1a4a1a";
  ctx.beginPath(); ctx.moveTo(-8, -2.5); ctx.lineTo(-22, -1.5); ctx.lineTo(-22, 1.5); ctx.lineTo(-8, 2.5); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#2a6a2a";
  ctx.beginPath(); ctx.moveTo(-22, 0); ctx.lineTo(-26, -6); ctx.lineTo(-20, -1); ctx.closePath(); ctx.fill();
  // Body
  ctx.fillStyle = "#2a5a2a";
  ctx.beginPath(); ctx.moveTo(16, 0); ctx.bezierCurveTo(14, -7, 6, -10, -4, -9); ctx.lineTo(-10, -6); ctx.lineTo(-8, 0); ctx.lineTo(-10, 6); ctx.lineTo(-4, 9); ctx.bezierCurveTo(6, 10, 14, 7, 16, 0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "rgba(100,180,100,0.3)"; ctx.beginPath(); ctx.ellipse(4, -3, 8, 3, -0.1, 0, Math.PI * 2); ctx.fill();
  // Pylons
  ctx.fillStyle = "#1a3a1a"; ctx.fillRect(-2, -12, 8, 3); ctx.fillRect(-2, 9, 8, 3);
  ctx.fillStyle = "#444"; ctx.fillRect(10, -11.5, 6, 2); ctx.fillRect(10, 9.5, 6, 2);
  // Cockpit
  const grad = ctx.createRadialGradient(10, 0, 0, 10, 0, 6);
  grad.addColorStop(0, "#aaddff"); grad.addColorStop(0.6, "#6699cc"); grad.addColorStop(1, "#335577");
  ctx.fillStyle = grad; ctx.beginPath(); ctx.ellipse(10, 0, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#4a8a4a"; ctx.lineWidth = 0.8; ctx.beginPath(); ctx.ellipse(10, 0, 6, 5, 0, 0, Math.PI * 2); ctx.stroke();
  // Intake
  ctx.fillStyle = "#1a3a1a"; ctx.beginPath(); ctx.ellipse(-2, 0, 3, 5, 0, 0, Math.PI * 2); ctx.fill();
  // Exhaust
  if (player.engineGlow > 0.3) { ctx.globalAlpha = (player.engineGlow - 0.3) * 0.5; ctx.fillStyle = "#557799"; ctx.beginPath(); ctx.ellipse(-10, 0, 3, 2, 0, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = player.invincible > 0 && Math.sin(time * 30) > 0 ? 0.4 : 1; }
  // Outline
  ctx.strokeStyle = "#4a8a4a"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(16, 0); ctx.bezierCurveTo(14, -7, 6, -10, -4, -9); ctx.lineTo(-10, -6); ctx.lineTo(-8, 0); ctx.lineTo(-10, 6); ctx.lineTo(-4, 9); ctx.bezierCurveTo(6, 10, 14, 7, 16, 0); ctx.stroke();
  ctx.restore();
  // Main rotor
  ctx.save(); ctx.translate(px, py); ctx.rotate(player.rotorAngle);
  ctx.globalAlpha = 0.06; ctx.fillStyle = "#ccc"; ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 0.6; ctx.strokeStyle = "#ddd"; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(20, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(0, 20); ctx.stroke();
  ctx.fillStyle = "#ff4400"; ctx.globalAlpha = 0.8;
  ctx.beginPath(); ctx.arc(-20, 0, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(20, 0, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(0, -20, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(0, 20, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1; ctx.fillStyle = "#888"; ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  // Tail rotor
  ctx.save(); ctx.translate(px, py); ctx.rotate(a); ctx.translate(-22, -5); ctx.rotate(player.tailRotorAngle);
  ctx.globalAlpha = 0.5; ctx.strokeStyle = "#ccc"; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(5, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(0, 5); ctx.stroke();
  ctx.restore(); ctx.globalAlpha = 1;
  // Shield
  if (player.shieldActive) {
    ctx.save(); ctx.translate(px, py);

    ctx.strokeStyle = "#aa44ff"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 0, 24, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = "rgba(170,68,255,0.05)"; ctx.fill(); ctx.restore();
  }
  // Pickup radius indicator (when magnet active)

    ctx.save(); ctx.translate(px, py);
    ctx.globalAlpha = 0.08 + Math.sin(time * 4) * 0.04;
    ctx.strokeStyle = "#ffcc00"; ctx.lineWidth = 1;
